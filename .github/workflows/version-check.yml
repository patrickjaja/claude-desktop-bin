name: Version Check

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  contents: write
  actions: write   # to dispatch build-and-release.yml on a new version (auto-PR path)

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Poll the official Linux .deb apt repository (NOT the old Windows
      # win32/x64/.latest endpoint). The shared helper GPG-verifies the
      # signed Release, validates the Packages index against it, and prints
      # the highest version across amd64+arm64.
      # ----------------------------------------------------------------
      - name: Query latest upstream version (apt Packages, GPG-verified)
        id: upstream
        run: |
          if ! VERSION=$(bash .github/scripts/apt-fetch-verify.sh poll 2>/tmp/poll.err); then
            echo "::warning::Failed to query/verify the apt repository"
            cat /tmp/poll.err >&2 || true
            exit 0
          fi
          VERSION=$(echo "$VERSION" | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Upstream version (apt): ${VERSION}"

      - name: Get current tracked version
        id: tracked
        if: steps.upstream.outputs.version
        run: |
          # .upstream-version tracks which Claude Desktop version our patches &
          # docs were last validated against. Bump + commit it once a version is
          # handled - even a trivial build bump - to silence the issue.
          if [ -f .upstream-version ]; then
            CURRENT=$(tr -d '[:space:]' < .upstream-version)
          else
            CURRENT=""
          fi
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current tracked version: ${CURRENT}"

      - name: Ensure new-version label exists
        if: steps.upstream.outputs.version && steps.tracked.outputs.version != steps.upstream.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "new-version" \
            --repo "${{ github.repository }}" \
            --description "Auto-created: new upstream Claude Desktop version detected" \
            --color "0E8A16" \
            2>/dev/null || true

      - name: Check for existing notification issue
        id: existing
        if: steps.upstream.outputs.version && steps.tracked.outputs.version != steps.upstream.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          ISSUE_COUNT=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "new-version" \
            --state open \
            --search "New Claude Desktop v${UPSTREAM}" \
            --json number \
            --jq 'length')

          echo "count=${ISSUE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Open issues for v${UPSTREAM}: ${ISSUE_COUNT}"

      - name: Render issue body from template
        id: body
        if: |
          steps.upstream.outputs.version &&
          steps.tracked.outputs.version != steps.upstream.outputs.version &&
          steps.existing.outputs.count == '0'
        env:
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          TRACKED: ${{ steps.tracked.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          TEMPLATE=".github/issue-templates/new-version-body.md"

          # Substitute simple placeholders
          BODY=$(cat "$TEMPLATE")
          BODY="${BODY//\{\{UPSTREAM\}\}/${UPSTREAM}}"
          BODY="${BODY//\{\{TRACKED\}\}/${TRACKED}}"
          BODY="${BODY//\{\{REPO\}\}/${REPO}}"

          # Inject CC_PROMPT (multi-line): split at marker, reassemble with file content
          BEFORE=$(echo "$BODY" | sed '/{{CC_PROMPT}}/Q')
          AFTER=$(echo "$BODY" | sed '1,/{{CC_PROMPT}}/d')
          CC_CONTENT=$(cat UPDATE-PROMPT-CC-INPUT-MANUAL.md)

          {
            echo "$BEFORE"
            echo "$CC_CONTENT"
            echo "$AFTER"
          } > /tmp/issue-body.md

      - name: Create notification issue
        if: |
          steps.upstream.outputs.version &&
          steps.tracked.outputs.version != steps.upstream.outputs.version &&
          steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --repo "${REPO}" \
            --label "new-version" \
            --title "New Claude Desktop v${UPSTREAM} detected" \
            --body-file /tmp/issue-body.md

          echo "::notice::Created issue for new version v${UPSTREAM}"

      # ----------------------------------------------------------------
      # AUTO-RELEASE path: on a newly detected version, kick off a full
      # release run. Patches are strict (every sub-patch must apply or the
      # build fails loud), so a green run means the new version is handled:
      # it publishes the release, pushes AUR, and commits README versions +
      # Nix hash + .upstream-version back to master. On failure the run
      # comments on the tracking issue created above - that is the signal
      # for a human to run the /update skill (fix or remove patches).
      # We dispatch only once per version by gating on the same "no open
      # issue yet" condition used above, so the 2-hourly cron doesn't spawn
      # duplicate runs while a release attempt is in flight or has failed.
      # ----------------------------------------------------------------
      - name: Trigger auto-release build for the new version
        if: |
          steps.upstream.outputs.version &&
          steps.tracked.outputs.version != steps.upstream.outputs.version &&
          steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if gh workflow run build-and-release.yml \
              --repo "${REPO}" \
              --ref master \
              -f deb_version="${UPSTREAM}" 2>/tmp/dispatch.err; then
            echo "::notice::Dispatched auto-release build for v${UPSTREAM}"
          else
            echo "::warning::Could not dispatch auto-release build (continuing; issue still filed)"
            cat /tmp/dispatch.err >&2 || true
          fi

      - name: Update version badge on gh-pages
        if: steps.upstream.outputs.version && steps.tracked.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          TRACKED: ${{ steps.tracked.outputs.version }}
        run: |
          if [ "${TRACKED}" = "${UPSTREAM}" ]; then
            COLOR="brightgreen"
            MESSAGE="v${TRACKED} (latest)"
          else
            COLOR="red"
            MESSAGE="v${TRACKED} <- v${UPSTREAM} available"
          fi

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          REPO_DIR="/tmp/gh-pages-badge"
          rm -rf "$REPO_DIR"

          if git ls-remote --heads "$REMOTE" gh-pages | grep -q gh-pages; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$REPO_DIR"
          else
            mkdir -p "$REPO_DIR" && cd "$REPO_DIR"
            git init && git checkout -b gh-pages && git remote add origin "$REMOTE"
            cd -
          fi

          mkdir -p "$REPO_DIR/badges"
          cat > "$REPO_DIR/badges/version-check.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Claude Desktop",
            "message": "${MESSAGE}",
            "color": "${COLOR}"
          }
          BADGE_EOF

          # Seed APT/RPM badges from repo contents (if not yet present)
          if [ ! -f "$REPO_DIR/badges/apt-repo.json" ] && [ -f "$REPO_DIR/deb/Packages" ]; then
            DEB_VER=$(grep -m1 '^Version:' "$REPO_DIR/deb/Packages" | awk '{print $2}' | cut -d- -f1)
            DEB_ARCHS=$(grep '^Architecture:' "$REPO_DIR/deb/Packages" | awk '{print $2}' | sort -u | paste -sd', ')
            cat > "$REPO_DIR/badges/apt-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "APT repo",
            "message": "v${DEB_VER} (${DEB_ARCHS})",
            "color": "blue"
          }
          BADGE_EOF
          fi

          if [ ! -f "$REPO_DIR/badges/rpm-repo.json" ] && [ -d "$REPO_DIR/rpm" ]; then
            RPM_ARCHS=""
            [ -d "$REPO_DIR/rpm/x86_64" ] && RPM_ARCHS="x86_64"
            [ -d "$REPO_DIR/rpm/aarch64" ] && RPM_ARCHS="${RPM_ARCHS:+$RPM_ARCHS, }aarch64"
            RPM_VER=$(ls "$REPO_DIR/rpm/x86_64/" 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+' || echo "${TRACKED}")
            cat > "$REPO_DIR/badges/rpm-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "RPM repo",
            "message": "v${RPM_VER} (${RPM_ARCHS})",
            "color": "blue"
          }
          BADGE_EOF
          fi

          # Seed AppImage/Nix badges from GitHub release assets (if not yet present)
          if [ ! -f "$REPO_DIR/badges/appimage.json" ] || [ ! -f "$REPO_DIR/badges/nix.json" ]; then
            ASSETS=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              print(a['name'])
          " 2>/dev/null || true)

            if [ ! -f "$REPO_DIR/badges/appimage.json" ] && echo "$ASSETS" | grep -q '\.AppImage$'; then
              APPIMAGE_ARCHS=""
              echo "$ASSETS" | grep -q 'x86_64\.AppImage$' && APPIMAGE_ARCHS="x86_64"
              echo "$ASSETS" | grep -q 'aarch64\.AppImage$' && APPIMAGE_ARCHS="${APPIMAGE_ARCHS:+$APPIMAGE_ARCHS, }aarch64"
              cat > "$REPO_DIR/badges/appimage.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "AppImage",
            "message": "v${TRACKED} (${APPIMAGE_ARCHS})",
            "color": "blue"
          }
          BADGE_EOF
            fi

            if [ ! -f "$REPO_DIR/badges/nix.json" ]; then
              cat > "$REPO_DIR/badges/nix.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Nix flake",
            "message": "v${TRACKED}",
            "color": "blue"
          }
          BADGE_EOF
            fi
          fi

          cd "$REPO_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --staged --quiet || {
            git commit -m "Update version badge: ${MESSAGE}"
            git push origin gh-pages
          }
