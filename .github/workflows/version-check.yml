name: Check for New Claude Desktop Version

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Query latest upstream version
        id: upstream
        run: |
          LATEST_JSON=$(wget -q -O - "https://downloads.claude.ai/releases/win32/x64/.latest") || {
            echo "::warning::Failed to query Claude version API"
            exit 0
          }

          VERSION=$(echo "$LATEST_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Upstream version: ${VERSION}"

      - name: Get latest released version
        id: released
        if: steps.upstream.outputs.version
        env:
          REPO: ${{ github.repository }}
        run: |
          HIGHEST_VERSION=$(curl -sf "https://api.github.com/repos/${REPO}/releases?per_page=20" | python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          versions = []
          for r in releases:
              tag = r['tag_name'].lstrip('v')
              base = tag.split('-')[0] if '-' in tag else tag
              parts = [int(x) for x in base.split('.')]
              versions.append((parts, base))
          if versions:
              versions.sort(key=lambda x: x[0], reverse=True)
              print(versions[0][1])
          else:
              print('')
          ")

          echo "version=${HIGHEST_VERSION}" >> $GITHUB_OUTPUT
          echo "Latest released version: ${HIGHEST_VERSION}"

      - name: Ensure new-version label exists
        if: steps.upstream.outputs.version && steps.released.outputs.version != steps.upstream.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "new-version" \
            --repo "${{ github.repository }}" \
            --description "Auto-created: new upstream Claude Desktop version detected" \
            --color "0E8A16" \
            2>/dev/null || true

      - name: Check for existing notification issue
        id: existing
        if: steps.upstream.outputs.version && steps.released.outputs.version != steps.upstream.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          ISSUE_COUNT=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "new-version" \
            --state open \
            --search "New Claude Desktop v${UPSTREAM}" \
            --json number \
            --jq 'length')

          echo "count=${ISSUE_COUNT}" >> $GITHUB_OUTPUT
          echo "Open issues for v${UPSTREAM}: ${ISSUE_COUNT}"

      - name: Create notification issue
        if: |
          steps.upstream.outputs.version &&
          steps.released.outputs.version != steps.upstream.outputs.version &&
          steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          RELEASED: ${{ steps.released.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --repo "${REPO}" \
            --label "new-version" \
            --title "New Claude Desktop v${UPSTREAM} detected" \
            --body "$(cat <<EOF
          ## New upstream version detected

          | | Version |
          |---|---|
          | **Upstream** | \`${UPSTREAM}\` |
          | **Current release** | \`${RELEASED}\` |

          ### Next steps

          1. Check if patches still apply: \`./scripts/build-local.sh\`
          2. If patches break, debug with: \`./scripts/validate-patches.sh\`
          3. Once working, trigger the build workflow:

          **[▶ Trigger build manually](https://github.com/${REPO}/actions/workflows/update-aur.yml)**

          Or via CLI:
          \`\`\`bash
          gh workflow run update-aur.yml
          \`\`\`

          ---
          *Auto-detected by [version-check workflow](https://github.com/${REPO}/actions/workflows/version-check.yml)*
          EOF
          )"

          echo "::notice::Created issue for new version v${UPSTREAM}"

      - name: Update version badge on gh-pages
        if: steps.upstream.outputs.version && steps.released.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          RELEASED: ${{ steps.released.outputs.version }}
        run: |
          if [ "${RELEASED}" = "${UPSTREAM}" ]; then
            COLOR="brightgreen"
            MESSAGE="v${RELEASED} (latest)"
          else
            COLOR="red"
            MESSAGE="v${RELEASED} ← v${UPSTREAM} available"
          fi

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          REPO_DIR="/tmp/gh-pages-badge"
          rm -rf "$REPO_DIR"

          if git ls-remote --heads "$REMOTE" gh-pages | grep -q gh-pages; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$REPO_DIR"
          else
            mkdir -p "$REPO_DIR" && cd "$REPO_DIR"
            git init && git checkout -b gh-pages && git remote add origin "$REMOTE"
            cd -
          fi

          mkdir -p "$REPO_DIR/badges"
          cat > "$REPO_DIR/badges/version-check.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Claude Desktop",
            "message": "${MESSAGE}",
            "color": "${COLOR}"
          }
          BADGE_EOF

          # Seed APT/RPM badges from repo contents (if not yet present)
          if [ ! -f "$REPO_DIR/badges/apt-repo.json" ] && [ -f "$REPO_DIR/deb/Packages" ]; then
            DEB_VER=$(grep -m1 '^Version:' "$REPO_DIR/deb/Packages" | awk '{print $2}' | cut -d- -f1)
            DEB_ARCHS=$(grep '^Architecture:' "$REPO_DIR/deb/Packages" | awk '{print $2}' | sort -u | paste -sd', ')
            cat > "$REPO_DIR/badges/apt-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "APT repo",
            "message": "v${DEB_VER} (${DEB_ARCHS})",
            "color": "blue"
          }
          BADGE_EOF
          fi

          if [ ! -f "$REPO_DIR/badges/rpm-repo.json" ] && [ -d "$REPO_DIR/rpm" ]; then
            RPM_ARCHS=""
            [ -d "$REPO_DIR/rpm/x86_64" ] && RPM_ARCHS="x86_64"
            [ -d "$REPO_DIR/rpm/aarch64" ] && RPM_ARCHS="${RPM_ARCHS:+$RPM_ARCHS, }aarch64"
            RPM_VER=$(ls "$REPO_DIR/rpm/x86_64/" 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+' || echo "${RELEASED}")
            cat > "$REPO_DIR/badges/rpm-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "RPM repo",
            "message": "v${RPM_VER} (${RPM_ARCHS})",
            "color": "blue"
          }
          BADGE_EOF
          fi

          cd "$REPO_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --staged --quiet || {
            git commit -m "Update version badge: ${MESSAGE}"
            git push origin gh-pages
          }
