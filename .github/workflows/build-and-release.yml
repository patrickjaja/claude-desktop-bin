name: Build & Release

on:
  workflow_dispatch:  # Manual trigger only (version-check.yml notifies of new versions)
    inputs:
      download_url:
        description: 'Manual download URL (optional - bypasses auto-detection if Cloudflare blocks)'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild & release even if upstream version unchanged (bumps pkgrel for patch/feature updates)'
        required: false
        type: boolean
        default: false

# ──────────────────────────────────────────────────────────────────────
# Job graph (fan-out / fan-in):
#
#   check-version ──► build-tarball ──┬── package-appimage (matrix: x86_64, aarch64)
#                                     ├── package-deb      (matrix: amd64, arm64)
#                                     ├── package-rpm      (matrix: x86_64, aarch64)
#                                     ├── test-nix
#                                     └── generate-pkgbuild
#                                              │
#                                     release (needs all above, deploys APT + gh-pages)
#                                              │
#                                     deploy-rpm-repo (fedora:40 container, signs RPMs)
# ──────────────────────────────────────────────────────────────────────

jobs:
  # ================================================================
  # Job 1: Check version & determine if update is needed
  # ================================================================
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      needs_update: ${{ steps.check.outputs.needs_update }}
      highest_version: ${{ steps.check.outputs.highest_version }}
      pkgrel: ${{ steps.pkgrel.outputs.pkgrel }}
      tag: ${{ steps.pkgrel.outputs.tag }}
      release_name: ${{ steps.pkgrel.outputs.release_name }}
      make_latest: ${{ steps.pkgrel.outputs.make_latest }}
      changelog: ${{ steps.git_changelog.outputs.content }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git changelog generation

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget

      - name: Download Claude Setup and capture URL
        id: download
        env:
          MANUAL_URL: ${{ github.event.inputs.download_url }}
        run: |
          if [ -n "$MANUAL_URL" ]; then
            echo "Using manually provided download URL"
            echo "Download URL: ${MANUAL_URL}"

            wget -q -O Claude-Setup-x64.exe \
              -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "${MANUAL_URL}"

            echo "url=${MANUAL_URL}" >> $GITHUB_OUTPUT
          else
            echo "Querying Claude Desktop version API..."
            LATEST_JSON=$(wget -q -O - "https://downloads.claude.ai/releases/win32/x64/.latest")

            if [ -z "$LATEST_JSON" ]; then
              echo "Error: Failed to query version API"
              exit 1
            fi

            LATEST_VERSION=$(echo "$LATEST_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
            LATEST_HASH=$(echo "$LATEST_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['hash'])")
            DOWNLOAD_URL="https://downloads.claude.ai/releases/win32/x64/${LATEST_VERSION}/Claude-${LATEST_HASH}.exe"

            echo "Latest version: ${LATEST_VERSION}"
            echo "Download URL: ${DOWNLOAD_URL}"

            wget -q -O Claude-Setup-x64.exe \
              -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$DOWNLOAD_URL"

            echo "url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT
          fi

      - name: Extract version
        id: version
        run: |
          VERSION=$(bash ./scripts/extract-version.sh Claude-Setup-x64.exe)
          echo "Version extracted: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          RELEASES_JSON=$(curl -sf "https://api.github.com/repos/${REPO}/releases?per_page=20") || {
            echo "::error::Failed to fetch releases from GitHub API (rate limit or auth issue)"
            exit 1
          }

          HIGHEST_VERSION=$(echo "$RELEASES_JSON" | python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          versions = []
          for r in releases:
              tag = r['tag_name'].lstrip('v')
              base = tag.split('-')[0] if '-' in tag else tag
              parts = [int(x) for x in base.split('.')]
              versions.append((parts, base))
          if versions:
              versions.sort(key=lambda x: x[0], reverse=True)
              print(versions[0][1])
          else:
              print('')
          ")

          if [ -z "$HIGHEST_VERSION" ]; then
            echo "::error::No releases found — cannot determine highest version"
            exit 1
          fi

          echo "Highest released version: ${HIGHEST_VERSION}"
          echo "Current version: ${CURRENT_VERSION}"
          echo "highest_version=${HIGHEST_VERSION}" >> $GITHUB_OUTPUT

          if [ "$HIGHEST_VERSION" != "${CURRENT_VERSION}" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Version changed from ${HIGHEST_VERSION} to ${CURRENT_VERSION}"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

      - name: Determine package release number
        id: pkgrel
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          FORCE: ${{ github.event.inputs.force_rebuild }}
          NEEDS_UPDATE: ${{ steps.check.outputs.needs_update }}
          HIGHEST_VERSION: ${{ steps.check.outputs.highest_version }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$FORCE" == "true" ] && [ "$NEEDS_UPDATE" != "true" ]; then
            RELEASE_COUNT=$(curl -s "https://api.github.com/repos/${REPO}/releases?per_page=100" \
              | jq "[.[] | select(.tag_name | test(\"^v${VERSION}(-[0-9]+)?$\"))] | length")
            PKGREL=$((RELEASE_COUNT + 1))
          else
            PKGREL=1
          fi

          if [ "$PKGREL" -gt 1 ]; then
            TAG="v${VERSION}-${PKGREL}"
            RELEASE_NAME="Claude Desktop ${VERSION} (patch release ${PKGREL})"
          else
            TAG="v${VERSION}"
            RELEASE_NAME="Claude Desktop ${VERSION}"
          fi

          if [ "$VERSION" = "$HIGHEST_VERSION" ] || [ "$NEEDS_UPDATE" = "true" ]; then
            MAKE_LATEST="true"
          else
            MAKE_LATEST="false"
            echo "::warning::Building v${VERSION} but v${HIGHEST_VERSION} is higher — will NOT mark as Latest"
          fi

          echo "pkgrel=${PKGREL}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "make_latest=${MAKE_LATEST}" >> $GITHUB_OUTPUT
          echo "Package release: pkgrel=${PKGREL}, Tag: ${TAG}, Latest: ${MAKE_LATEST}"

      - name: Extract changelog for this release
        id: git_changelog
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          CHANGELOG=$(awk '
            /^## [0-9]{4}-[0-9]{2}-[0-9]{2}/ {
              if (found) exit;
              found = 1;
              next
            }
            found { print }
          ' CHANGELOG.md | sed '/^$/N;/^\n$/d')

          if [ -z "$CHANGELOG" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              CHANGELOG=$(git log "${LAST_TAG}..HEAD" --format="- %s" --no-merges --reverse)
            else
              CHANGELOG="No changes since last release."
            fi
          fi

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Decide if build should proceed
        id: decide
        run: |
          if [ "${{ steps.check.outputs.needs_update }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload exe for build job
        if: steps.decide.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-setup-exe
          path: Claude-Setup-x64.exe
          retention-days: 1

  # ================================================================
  # Job 1b: Lint shell scripts with shellcheck
  # ================================================================
  lint-scripts:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck on all scripts
        run: |
          echo "=== Running shellcheck on shell scripts ==="
          FAILED=false
          for f in scripts/*.sh packaging/apt/*.sh packaging/rpm/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            if ! shellcheck -S error "$f"; then
              FAILED=true
            fi
          done
          if [ "$FAILED" = true ]; then
            echo "::error::shellcheck found errors in one or more scripts"
            exit 1
          fi
          echo "All scripts passed shellcheck"

      - name: Validate .desktop files
        run: |
          sudo apt-get install -y desktop-file-utils
          echo "=== Validating .desktop entries ==="
          FAILED=false
          # Extract .desktop from PKGBUILD.template
          sed -n '/^\[Desktop Entry\]/,/^EOF$/p' PKGBUILD.template | head -n -1 > /tmp/claude.desktop
          if desktop-file-validate /tmp/claude.desktop 2>&1 | grep -q "warning:"; then
            echo "::error::PKGBUILD.template .desktop has warnings:"
            desktop-file-validate /tmp/claude.desktop 2>&1 | grep "warning:"
            FAILED=true
          fi
          # Also validate standalone .desktop files
          for f in packaging/debian/*.desktop; do
            [ -f "$f" ] || continue
            if desktop-file-validate "$f" 2>&1 | grep -q "warning:"; then
              echo "::error::$f has warnings:"
              desktop-file-validate "$f" 2>&1 | grep "warning:"
              FAILED=true
            fi
          done
          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "All .desktop files passed validation"

      - name: Run ruff on Python patches
        run: |
          pip install ruff
          echo "=== Running ruff check on patches ==="
          ruff check patches/
          echo "=== Running ruff format check on patches ==="
          ruff format --check patches/

  # ================================================================
  # Job 2: Build the patched tarball (the main bottleneck)
  # ================================================================
  build-tarball:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      tarball_sha256: ${{ steps.pty-rebuild.outputs.tarball_sha256 || steps.build.outputs.tarball_sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-setup-exe

      - name: Build Patched Tarball
        id: build
        run: |
          echo "=== Building pre-patched tarball in Arch Linux container ==="

          mkdir -p /tmp/build-input /tmp/build-output
          cp Claude-Setup-x64.exe /tmp/build-input/
          cp -r scripts patches /tmp/build-input/

          docker run --rm \
            -v /tmp/build-input:/input:ro \
            -v /tmp/build-output:/output \
            archlinux:base-devel \
            bash -c "
              set -eo pipefail

              echo '=== Installing build dependencies ==='
              pacman -Syu --noconfirm
              pacman -S --noconfirm p7zip python nodejs npm git icoutils xorg-server-xvfb electron shellcheck

              echo '=== Installing asar from AUR ==='
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
              cd /tmp
              git clone https://aur.archlinux.org/yay-bin.git
              chown -R builder:builder yay-bin
              cd yay-bin
              su builder -c 'makepkg -si --noconfirm'
              su builder -c 'yay -S --noconfirm asar'

              echo '=== Running build script ==='
              bash /input/scripts/build-patched-tarball.sh /input/Claude-Setup-x64.exe /output

              echo '=== Build completed ==='
            " 2>&1 | tee build-output.log

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "::error::Build FAILED!"
            echo ""
            echo "=== PATCH FAILURE DETAILS ==="
            grep -E "(ERROR|FAIL|\[FAIL\])" build-output.log || true
            echo ""
            echo "The upstream Claude Desktop may have changed."
            echo "Please update the patch patterns to match the new file structure."
            exit 1
          fi

          source /tmp/build-output/build-info.txt
          echo "tarball_sha256=${SHA256}" >> $GITHUB_OUTPUT

          echo "Build passed - tarball ready for upload"
          echo "  Version: ${VERSION}"
          echo "  SHA256:  ${SHA256}"

      - name: Rebuild node-pty for glibc compatibility
        id: pty-rebuild
        run: |
          echo "=== Rebuilding node-pty against old glibc (Debian 11 / glibc 2.31) ==="
          TARBALL=$(ls /tmp/build-output/claude-desktop-*-linux.tar.gz)
          REPACK_DIR=$(mktemp -d)

          # Extract tarball
          tar xzf "$TARBALL" -C "$REPACK_DIR"

          # Check if pty.node exists and is a Linux ELF
          PTY_NODE="$REPACK_DIR/app/app.asar.unpacked/node_modules/node-pty/build/Release/pty.node"
          if [ ! -f "$PTY_NODE" ] || ! file "$PTY_NODE" | grep -q "ELF 64-bit"; then
            echo "No Linux pty.node found in tarball — skipping rebuild"
            rm -rf "$REPACK_DIR"
            exit 0
          fi

          echo "Before rebuild: $(objdump -T "$PTY_NODE" 2>/dev/null | grep -oP 'GLIBC_\S+' | sort -uV | tail -1)"

          # Read versions from package.json inside the asar contents
          # The asar was already repacked, so extract it temporarily
          ASAR_DIR=$(mktemp -d)
          npx --yes @electron/asar extract "$REPACK_DIR/app/app.asar" "$ASAR_DIR"
          ELECTRON_VERSION=$(node -e "console.log(require('$ASAR_DIR/package.json').devDependencies?.electron || '')" 2>/dev/null)
          NODE_PTY_VERSION=$(node -e "console.log(require('$ASAR_DIR/package.json').optionalDependencies?.['node-pty'] || '')" 2>/dev/null)
          rm -rf "$ASAR_DIR"

          if [ -z "$ELECTRON_VERSION" ] || [ -z "$NODE_PTY_VERSION" ]; then
            echo "::warning::Could not detect Electron ($ELECTRON_VERSION) or node-pty ($NODE_PTY_VERSION) version — skipping glibc-compat rebuild"
            rm -rf "$REPACK_DIR"
            exit 0
          fi

          echo "Rebuilding node-pty@$NODE_PTY_VERSION against Electron $ELECTRON_VERSION in node:20-bullseye (glibc 2.31)"

          mkdir -p /tmp/pty-compat-output
          docker run --rm \
            -v /tmp/pty-compat-output:/output \
            node:20-bullseye \
            bash -c "
              set -e
              apt-get update && apt-get install -y build-essential python3 > /dev/null 2>&1
              cd /tmp
              npm init -y > /dev/null 2>&1
              npm install 'node-pty@$NODE_PTY_VERSION' --ignore-scripts 2>&1 | tail -1
              npx @electron/rebuild --version '$ELECTRON_VERSION' \
                --module-dir node_modules/node-pty --arch x64 2>&1 | tail -3
              cp node_modules/node-pty/build/Release/pty.node /output/pty.node
            "

          REBUILT_PTY="/tmp/pty-compat-output/pty.node"
          if [ -f "$REBUILT_PTY" ] && file "$REBUILT_PTY" | grep -q "ELF 64-bit"; then
            cp "$REBUILT_PTY" "$PTY_NODE"
            echo "After rebuild: $(objdump -T "$PTY_NODE" 2>/dev/null | grep -oP 'GLIBC_\S+' | sort -uV | tail -1)"
            echo "node-pty rebuilt successfully for glibc compatibility"
          else
            echo "::error::node-pty glibc-compat rebuild failed"
            rm -rf "$REPACK_DIR" /tmp/pty-compat-output
            exit 1
          fi

          # Repackage tarball (original is root-owned from Docker, so write to temp and replace)
          cd "$REPACK_DIR"
          TARBALL_TMP=$(mktemp)
          tar -czf "$TARBALL_TMP" app/ icons/ launcher/
          sudo cp "$TARBALL_TMP" "$TARBALL"
          sudo chown "$(id -u):$(id -g)" "$TARBALL"
          rm -f "$TARBALL_TMP"
          NEW_SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)

          # Update build-info.txt with new SHA256 (also root-owned)
          sudo sed -i "s/^SHA256=.*/SHA256=$NEW_SHA256/" /tmp/build-output/build-info.txt

          # Update GitHub Actions output so downstream jobs use the new SHA256
          echo "tarball_sha256=$NEW_SHA256" >> $GITHUB_OUTPUT

          echo "Tarball repackaged with glibc-compat node-pty (SHA256: $NEW_SHA256)"
          rm -rf "$REPACK_DIR" /tmp/pty-compat-output

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: /tmp/build-output/claude-desktop-*-linux.tar.gz
          retention-days: 1

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          retention-days: 30
          if-no-files-found: ignore

  # ================================================================
  # Job 3a: Build & test AppImage (matrix: x86_64, aarch64) — PARALLEL
  # ================================================================
  package-appimage:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget unzip file zsync

      - name: Set up QEMU for ARM64
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Rebuild node-pty for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          TARBALL="claude-desktop-${{ needs.check-version.outputs.version }}-linux.tar.gz"
          bash scripts/rebuild-pty-for-arch.sh --arch aarch64 "$TARBALL"

      - name: Get Electron version
        id: electron
        run: |
          ELECTRON_VERSION=$(curl -s https://api.github.com/repos/electron/electron/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Using Electron version: ${ELECTRON_VERSION}"
          echo "electron_version=${ELECTRON_VERSION}" >> $GITHUB_OUTPUT

      - name: Build AppImage (${{ matrix.arch }})
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          ELECTRON_VERSION: ${{ steps.electron.outputs.electron_version }}
        run: |
          TARBALL="claude-desktop-${VERSION}-linux.tar.gz"

          ARCH_FLAG=""
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            ARCH_FLAG="--arch aarch64"
          fi

          bash packaging/appimage/build-appimage.sh $ARCH_FLAG "$TARBALL" ./dist

      - name: Test AppImage
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            docker run --rm --platform linux/arm64 \
              -v "$(pwd)/dist:/dist:ro" \
              arm64v8/ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq && apt-get install -y -qq file >/dev/null

                cp /dist/Claude_Desktop-*-aarch64.AppImage /tmp/
                chmod +x /tmp/Claude_Desktop-*-aarch64.AppImage
                cd /tmp

                # Verify the AppImage outer ELF is actually aarch64
                file /tmp/Claude_Desktop-*-aarch64.AppImage | grep -q 'aarch64\|ARM aarch64'
                echo 'AppImage ELF is aarch64 — OK'

                /tmp/Claude_Desktop-*-aarch64.AppImage --appimage-extract

                test -f /tmp/squashfs-root/usr/lib/claude-desktop/resources/app.asar
                test -x /tmp/squashfs-root/usr/lib/claude-desktop/claude-desktop
                file /tmp/squashfs-root/usr/lib/claude-desktop/claude-desktop | grep -q 'aarch64\|ARM aarch64'
                echo 'aarch64 AppImage smoke test passed'
              "
          else
            docker run --rm \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y xvfb libgtk-3-0 libnss3 libasound2 libgbm1 libnotify4

                cp /dist/Claude_Desktop-*-x86_64.AppImage /tmp/
                chmod +x /tmp/Claude_Desktop-*-x86_64.AppImage
                cd /tmp
                /tmp/Claude_Desktop-*-x86_64.AppImage --appimage-extract

                SKIP_SANDBOX_CHECK=1 bash /scripts/smoke-test.sh \
                  /tmp/squashfs-root/usr/lib/claude-desktop/resources/app.asar \
                  /tmp/squashfs-root/usr/lib/claude-desktop/claude-desktop
              "
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: |
            dist/Claude_Desktop-*-${{ matrix.arch }}.AppImage
            dist/Claude_Desktop-*-${{ matrix.arch }}.AppImage.zsync
          retention-days: 1

  # ================================================================
  # Job 3b: Build & test Debian package (matrix: amd64, arm64) — PARALLEL
  # ================================================================
  package-deb:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot

      - name: Set up QEMU for ARM64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Rebuild node-pty for arm64
        if: matrix.arch == 'arm64'
        run: |
          TARBALL="claude-desktop-${{ needs.check-version.outputs.version }}-linux.tar.gz"
          bash scripts/rebuild-pty-for-arch.sh --arch arm64 "$TARBALL"

      - name: Build Debian Package (${{ matrix.arch }})
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          TARBALL="claude-desktop-${VERSION}-linux.tar.gz"

          ARCH_FLAG=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ARCH_FLAG="--arch arm64"
          fi

          bash packaging/debian/build-deb.sh $ARCH_FLAG "$TARBALL" ./dist "$PKGREL"

      - name: Test Debian Package (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            docker run --rm --platform linux/arm64 \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              arm64v8/ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y /dist/claude-desktop-bin_*_arm64.deb
                test -f /usr/lib/claude-desktop/electron
                test -f /usr/lib/claude-desktop/resources/app.asar
                test -x /usr/bin/claude-desktop
                echo 'ARM64 Debian package installed successfully'
              "
          else
            docker run --rm \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y xvfb /dist/claude-desktop-bin_*_amd64.deb
                bash /scripts/smoke-test.sh \
                  /usr/lib/claude-desktop/resources/app.asar \
                  /usr/lib/claude-desktop/electron
              "
          fi

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/claude-desktop-bin_*_${{ matrix.arch }}.deb
          retention-days: 1

  # ================================================================
  # Job 3c: Build & test RPM package (matrix: x86_64, aarch64) — PARALLEL
  # ================================================================
  package-rpm:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Set up QEMU for ARM64
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Rebuild node-pty for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          TARBALL="claude-desktop-${{ needs.check-version.outputs.version }}-linux.tar.gz"
          bash scripts/rebuild-pty-for-arch.sh --arch aarch64 "$TARBALL"

      - name: Build RPM Package (${{ matrix.arch }})
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          TARBALL="claude-desktop-${VERSION}-linux.tar.gz"

          ARCH_FLAG=""
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            ARCH_FLAG="--arch aarch64"
          fi

          docker run --rm \
            -v "$(pwd):/build:ro" \
            -v "$(pwd)/dist:/output" \
            fedora:40 \
            bash -c "
              set -euo pipefail
              dnf install -y rpm-build wget unzip curl
              bash /build/packaging/rpm/build-rpm.sh $ARCH_FLAG /build/$TARBALL /output $PKGREL
            "

      - name: Test RPM Package (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            docker run --rm --platform linux/arm64 \
              -v "$(pwd)/dist:/dist:ro" \
              arm64v8/fedora:40 \
              bash -c "
                set -e
                dnf install -y /dist/claude-desktop-bin-*.aarch64.rpm
                test -f /usr/lib/claude-desktop/electron
                test -f /usr/lib/claude-desktop/resources/app.asar
                test -x /usr/bin/claude-desktop
                echo 'aarch64 RPM package installed successfully'
              "
          else
            docker run --rm \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              fedora:40 \
              bash -c "
                set -e
                dnf install -y xorg-x11-server-Xvfb /dist/claude-desktop-bin-*.x86_64.rpm
                bash /scripts/smoke-test.sh \
                  /usr/lib/claude-desktop/resources/app.asar \
                  /usr/lib/claude-desktop/electron
              "
          fi

      - name: Upload RPM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/claude-desktop-bin-*.${{ matrix.arch }}.rpm
          retention-days: 1

  # ================================================================
  # Job 3d: Test Nix build — PARALLEL
  # ================================================================
  test-nix:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      nix_hash: ${{ steps.nix-build.outputs.nix_hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build with Nix
        id: nix-build
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          TARBALL="$(pwd)/claude-desktop-${VERSION}-linux.tar.gz"

          HASH=$(nix hash file --type sha256 --sri "$TARBALL")
          echo "nix_hash=${HASH}" >> $GITHUB_OUTPUT

          sed -i -E "s|version = \"[^\"]+\"|version = \"$VERSION\"|" packaging/nix/package.nix
          sed -i -E "s|hash = \"sha256-[^\"]+\"|hash = \"$HASH\"|" packaging/nix/package.nix

          awk -v tarball="$TARBALL" '
            /src = fetchurl \{/ { print "  src = " tarball ";"; skip=1; next }
            skip && /\};/ { skip=0; next }
            !skip' packaging/nix/package.nix > /tmp/package-ci.nix
          mv /tmp/package-ci.nix packaging/nix/package.nix

          NIXPKGS_ALLOW_UNFREE=1 nix build .#claude-desktop --no-link --print-build-logs --impure

  # ================================================================
  # Job 3e: Generate PKGBUILD & .SRCINFO — PARALLEL
  # ================================================================
  generate-pkgbuild:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate PKGBUILD
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
          TARBALL_SHA256: ${{ needs.build-tarball.outputs.tarball_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          PREBUILT_URL="https://github.com/${REPO}/releases/download/${TAG}/claude-desktop-${VERSION}-linux.tar.gz"
          bash ./scripts/generate-pkgbuild.sh "${VERSION}" "${TARBALL_SHA256}" "$PREBUILT_URL" "${PKGREL}" > PKGBUILD
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cat << 'EOF' > generate-srcinfo.sh
          #!/bin/bash
          source PKGBUILD

          echo "pkgbase = ${pkgname}"
          echo -e "\tpkgdesc = ${pkgdesc}"
          echo -e "\tpkgver = ${pkgver}"
          echo -e "\tpkgrel = ${pkgrel}"
          echo -e "\turl = ${url}"
          echo -e "\tarch = ${arch[0]}"
          echo -e "\tlicense = ${license[0]}"

          for dep in "${makedepends[@]}"; do
            echo -e "\tmakedepends = ${dep}"
          done

          for dep in "${depends[@]}"; do
            echo -e "\tdepends = ${dep}"
          done

          for src in "${source_x86_64[@]}"; do
            echo -e "\tsource_x86_64 = ${src}"
          done

          for sum in "${sha256sums_x86_64[@]}"; do
            echo -e "\tsha256sums_x86_64 = ${sum}"
          done

          echo ""
          echo "pkgname = ${pkgname}"
          EOF

          bash generate-srcinfo.sh > .SRCINFO
          rm generate-srcinfo.sh
          cat .SRCINFO

      - name: Upload PKGBUILD artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkgbuild
          path: |
            PKGBUILD
            .SRCINFO
          include-hidden-files: true
          retention-days: 1

  # ================================================================
  # Job 4: Release & Publish (fan-in — waits for ALL parallel jobs)
  # ================================================================
  release:
    needs: [check-version, build-tarball, lint-scripts, package-appimage, package-deb, package-rpm, test-nix, generate-pkgbuild]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release files
        id: files
        run: |
          mkdir -p release-files

          # Tarball
          cp artifacts/tarball/claude-desktop-*-linux.tar.gz release-files/

          # AppImages
          cp artifacts/appimage-x86_64/Claude_Desktop-*-x86_64.AppImage release-files/
          cp artifacts/appimage-aarch64/Claude_Desktop-*-aarch64.AppImage release-files/

          # Zsync files (for AppImage delta updates)
          cp artifacts/appimage-x86_64/Claude_Desktop-*-x86_64.AppImage.zsync release-files/ 2>/dev/null || true
          cp artifacts/appimage-aarch64/Claude_Desktop-*-aarch64.AppImage.zsync release-files/ 2>/dev/null || true

          # DEBs
          cp artifacts/deb-amd64/claude-desktop-bin_*_amd64.deb release-files/
          cp artifacts/deb-arm64/claude-desktop-bin_*_arm64.deb release-files/

          # RPMs
          cp artifacts/rpm-x86_64/claude-desktop-bin-*.x86_64.rpm release-files/
          cp artifacts/rpm-aarch64/claude-desktop-bin-*.aarch64.rpm release-files/

          # PKGBUILD
          cp artifacts/pkgbuild/PKGBUILD .
          cp artifacts/pkgbuild/.SRCINFO .

          # Compute all SHA256 checksums
          echo "tarball_sha256=$(sha256sum release-files/claude-desktop-*-linux.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "appimage_x86_64_sha256=$(sha256sum release-files/Claude_Desktop-*-x86_64.AppImage | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "appimage_aarch64_sha256=$(sha256sum release-files/Claude_Desktop-*-aarch64.AppImage | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "deb_amd64_sha256=$(sha256sum release-files/claude-desktop-bin_*_amd64.deb | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "deb_arm64_sha256=$(sha256sum release-files/claude-desktop-bin_*_arm64.deb | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "rpm_x86_64_sha256=$(sha256sum release-files/claude-desktop-bin-*.x86_64.rpm | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "rpm_aarch64_sha256=$(sha256sum release-files/claude-desktop-bin-*.aarch64.rpm | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          ls -la release-files/

      - name: Create GitHub Release
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
          RELEASE_NAME: ${{ needs.check-version.outputs.release_name }}
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
          CHANGELOG: ${{ needs.check-version.outputs.changelog }}
          MAKE_LATEST: ${{ needs.check-version.outputs.make_latest }}
          TARBALL_SHA: ${{ steps.files.outputs.tarball_sha256 }}
          APPIMAGE_X86_SHA: ${{ steps.files.outputs.appimage_x86_64_sha256 }}
          APPIMAGE_ARM_SHA: ${{ steps.files.outputs.appimage_aarch64_sha256 }}
          DEB_AMD_SHA: ${{ steps.files.outputs.deb_amd64_sha256 }}
          DEB_ARM_SHA: ${{ steps.files.outputs.deb_arm64_sha256 }}
          RPM_X86_SHA: ${{ steps.files.outputs.rpm_x86_64_sha256 }}
          RPM_ARM_SHA: ${{ steps.files.outputs.rpm_aarch64_sha256 }}
          REPO: ${{ github.repository }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.release_name }}
          files: release-files/*
          body: |
            ## ${{ needs.check-version.outputs.release_name }}

            This release provides Claude Desktop version ${{ needs.check-version.outputs.version }} pre-patched for Linux.

            ### Installation Options

            **Arch Linux (AUR)**
            ```bash
            yay -S claude-desktop-bin
            ```

            **Debian/Ubuntu (APT Repository — recommended)**
            ```bash
            curl -fsSL https://patrickjaja.github.io/claude-desktop-bin/install.sh | sudo bash
            sudo apt install claude-desktop-bin
            ```

            **Debian/Ubuntu (manual .deb)**
            ```bash
            # x86_64
            sudo apt install ./claude-desktop-bin_${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}_amd64.deb
            # ARM64
            sudo apt install ./claude-desktop-bin_${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}_arm64.deb
            ```

            **Fedora/RHEL (RPM Repository — recommended)**
            ```bash
            curl -fsSL https://patrickjaja.github.io/claude-desktop-bin/install-rpm.sh | sudo bash
            sudo dnf install claude-desktop-bin
            ```

            **Fedora/RHEL (manual .rpm)**
            ```bash
            # x86_64
            sudo dnf install ./claude-desktop-bin-${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}.x86_64.rpm
            # ARM64
            sudo dnf install ./claude-desktop-bin-${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}.aarch64.rpm
            ```

            **NixOS / Nix**
            ```bash
            nix run github:patrickjaja/claude-desktop-bin
            ```

            **AppImage (Any Distro)**
            ```bash
            # x86_64
            chmod +x Claude_Desktop-${{ needs.check-version.outputs.version }}-x86_64.AppImage
            ./Claude_Desktop-${{ needs.check-version.outputs.version }}-x86_64.AppImage
            # ARM64
            chmod +x Claude_Desktop-${{ needs.check-version.outputs.version }}-aarch64.AppImage
            ./Claude_Desktop-${{ needs.check-version.outputs.version }}-aarch64.AppImage
            ```

            > **Update existing AppImage** (delta download — only changed blocks):
            > ```bash
            > appimageupdatetool Claude_Desktop-*-x86_64.AppImage
            > # Or from within the AppImage:
            > ./Claude_Desktop-*-x86_64.AppImage --appimage-update
            > ```

            ### Checksums
            | File | SHA256 |
            |------|--------|
            | Tarball | `${{ steps.files.outputs.tarball_sha256 }}` |
            | AppImage (x86_64) | `${{ steps.files.outputs.appimage_x86_64_sha256 }}` |
            | AppImage (aarch64) | `${{ steps.files.outputs.appimage_aarch64_sha256 }}` |
            | Debian (amd64) | `${{ steps.files.outputs.deb_amd64_sha256 }}` |
            | Debian (arm64) | `${{ steps.files.outputs.deb_arm64_sha256 }}` |
            | RPM (x86_64) | `${{ steps.files.outputs.rpm_x86_64_sha256 }}` |
            | RPM (aarch64) | `${{ steps.files.outputs.rpm_aarch64_sha256 }}` |

            ### Changes since last release
            ${{ needs.check-version.outputs.changelog }}

            ### Links
            - [AUR Package](https://aur.archlinux.org/packages/claude-desktop-bin)
            - [Full Changelog](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)
          draft: false
          prerelease: false
          make_latest: ${{ needs.check-version.outputs.make_latest }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy APT Repository and static files
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
          REPO: ${{ github.repository }}
        run: |
          DEB_FILE_AMD64="$(pwd)/release-files/claude-desktop-bin_${VERSION}-${PKGREL}_amd64.deb"
          DEB_FILE_ARM64="$(pwd)/release-files/claude-desktop-bin_${VERSION}-${PKGREL}_arm64.deb"
          RPM_FILE_X86_64="$(pwd)/release-files/claude-desktop-bin-${VERSION}-${PKGREL}.x86_64.rpm"
          RPM_FILE_AARCH64="$(pwd)/release-files/claude-desktop-bin-${VERSION}-${PKGREL}.aarch64.rpm"

          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY secret not set — skipping repo deploy"
            exit 0
          fi

          sudo apt-get install -y dpkg-dev apt-utils

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(echo "$GPG_PRIVATE_KEY" | gpg --show-keys --with-colons 2>/dev/null \
            | grep '^sec:' | head -1 | cut -d: -f5)

          REPO_DIR="/tmp/gh-pages-repo"
          rm -rf "$REPO_DIR"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          if git ls-remote --heads "$REMOTE" gh-pages | grep -q gh-pages; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$REPO_DIR"
          else
            mkdir -p "$REPO_DIR" && cd "$REPO_DIR"
            git init && git checkout -b gh-pages && git remote add origin "$REMOTE"
            cd -
          fi

          cp packaging/apt/install.sh "$REPO_DIR/"
          cp packaging/apt/index.html "$REPO_DIR/"
          cp packaging/rpm/install-rpm.sh "$REPO_DIR/"
          gpg --armor --export "$GPG_KEY_ID" > "$REPO_DIR/gpg-key.asc"
          touch "$REPO_DIR/.nojekyll"

          # Shields.io endpoint badges
          mkdir -p "$REPO_DIR/badges"
          cat > "$REPO_DIR/badges/version-check.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Claude Desktop",
            "message": "v${VERSION} (latest)",
            "color": "brightgreen"
          }
          BADGE_EOF

          # Detect which architectures were actually built
          DEB_ARCHS=""
          [ -f "$DEB_FILE_AMD64" ] && DEB_ARCHS="amd64"
          [ -f "$DEB_FILE_ARM64" ] && DEB_ARCHS="${DEB_ARCHS:+$DEB_ARCHS, }arm64"
          RPM_ARCHS=""
          [ -f "$RPM_FILE_X86_64" ] && RPM_ARCHS="x86_64"
          [ -f "$RPM_FILE_AARCH64" ] && RPM_ARCHS="${RPM_ARCHS:+$RPM_ARCHS, }aarch64"

          cat > "$REPO_DIR/badges/apt-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "APT repo",
            "message": "v${VERSION} (${DEB_ARCHS:-none})",
            "color": "blue"
          }
          BADGE_EOF

          cat > "$REPO_DIR/badges/rpm-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "RPM repo",
            "message": "v${VERSION} (${RPM_ARCHS:-none})",
            "color": "blue"
          }
          BADGE_EOF

          # AppImage badge — detect from release-files
          APPIMAGE_ARCHS=""
          ls release-files/Claude_Desktop-*-x86_64.AppImage >/dev/null 2>&1 && APPIMAGE_ARCHS="x86_64"
          ls release-files/Claude_Desktop-*-aarch64.AppImage >/dev/null 2>&1 && APPIMAGE_ARCHS="${APPIMAGE_ARCHS:+$APPIMAGE_ARCHS, }aarch64"
          cat > "$REPO_DIR/badges/appimage.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "AppImage",
            "message": "v${VERSION} (${APPIMAGE_ARCHS:-none})",
            "color": "blue"
          }
          BADGE_EOF

          # Nix flake badge — always built if we got here
          cat > "$REPO_DIR/badges/nix.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Nix flake",
            "message": "v${VERSION}",
            "color": "blue"
          }
          BADGE_EOF

          for DEB_FILE in "$DEB_FILE_AMD64" "$DEB_FILE_ARM64"; do
            if [ -f "$DEB_FILE" ]; then
              bash packaging/apt/update-apt-repo.sh "$DEB_FILE" "$REPO_DIR" "$GPG_KEY_ID"
            else
              echo "::warning::$(basename "$DEB_FILE") not found — skipping"
            fi
          done

          # Package the gh-pages content as an artifact for the RPM job to finalize.
          # Do NOT push here — the deploy-rpm-repo job will add RPMs and do the
          # single push, avoiding two Pages deployments and CDN race conditions.
          tar -czf /tmp/gh-pages-content.tar.gz -C "$REPO_DIR" .

      - name: Upload gh-pages content
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages-content
          path: /tmp/gh-pages-content.tar.gz
          retention-days: 1

      - name: Verify release tarball download
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
          VERSION: ${{ needs.check-version.outputs.version }}
          EXPECTED_SHA: ${{ needs.build-tarball.outputs.tarball_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/releases/download/${TAG}/claude-desktop-${VERSION}-linux.tar.gz"

          echo "Verifying release tarball at: ${URL}"
          for i in 1 2 3 4 5; do
            if wget -q -O /tmp/verify-tarball.tar.gz "${URL}" 2>/dev/null; then
              break
            fi
            echo "Attempt $i failed, waiting 10s..."
            sleep 10
          done

          if [ ! -f /tmp/verify-tarball.tar.gz ]; then
            echo "::error::Failed to download release tarball after 5 attempts"
            exit 1
          fi

          ACTUAL_SHA=$(sha256sum /tmp/verify-tarball.tar.gz | cut -d' ' -f1)
          rm -f /tmp/verify-tarball.tar.gz

          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::SHA256 MISMATCH! Expected: ${EXPECTED_SHA}, Got: ${ACTUAL_SHA}"
            echo "Aborting AUR push to prevent broken package."
            exit 1
          fi

          echo "Verified: SHA256 matches (${ACTUAL_SHA})"

      - name: Compute Nix hash from released tarball
        id: nix-hash
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # package.nix always uses v${version} (base version, no pkgrel suffix).
          # Compute the hash from that exact URL so it matches what users fetch.
          NIX_URL="https://github.com/${REPO}/releases/download/v${VERSION}/claude-desktop-${VERSION}-linux.tar.gz"

          echo "Fetching tarball from Nix fetchurl URL: ${NIX_URL}"
          for i in 1 2 3 4 5; do
            if wget -q -O /tmp/nix-tarball.tar.gz "${NIX_URL}" 2>/dev/null; then
              break
            fi
            echo "Attempt $i failed, waiting 10s..."
            sleep 10
          done

          if [ ! -f /tmp/nix-tarball.tar.gz ]; then
            echo "::error::Failed to download tarball from Nix URL after 5 attempts"
            exit 1
          fi

          RELEASED_NIX_HASH=$(python3 -c "
          import hashlib, base64
          h = hashlib.sha256(open('/tmp/nix-tarball.tar.gz','rb').read()).digest()
          print('sha256-' + base64.b64encode(h).decode())
          ")
          echo "released_nix_hash=${RELEASED_NIX_HASH}" >> $GITHUB_OUTPUT

          rm -f /tmp/nix-tarball.tar.gz
          echo "Nix SRI hash (from v${VERSION} release): ${RELEASED_NIX_HASH}"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          printf '%s\n' \
            "Host aur.archlinux.org" \
            "  User aur" \
            "  IdentityFile ~/.ssh/aur" \
            "  StrictHostKeyChecking no" \
            >> ~/.ssh/config

      - name: Push to AUR
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          git config --global user.name "$AUR_USERNAME"
          git config --global user.email "$AUR_EMAIL"

          git clone ssh://aur@aur.archlinux.org/claude-desktop-bin.git aur-repo

          cp PKGBUILD .SRCINFO aur-repo/

          cd aur-repo
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || {
            git commit -m "Update to ${VERSION}-${PKGREL}"
            git push origin master
            echo "Successfully pushed to AUR"
          }

      - name: Update README with new version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          sed -i -E "s/claude-desktop-bin_[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?_amd64\.deb/claude-desktop-bin_${VERSION}-${PKGREL}_amd64.deb/g" README.md
          sed -i -E "s/claude-desktop-bin_[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?_arm64\.deb/claude-desktop-bin_${VERSION}-${PKGREL}_arm64.deb/g" README.md
          sed -i -E "s/claude-desktop-bin-[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?\.x86_64\.rpm/claude-desktop-bin-${VERSION}-${PKGREL}.x86_64.rpm/g" README.md
          sed -i -E "s/claude-desktop-bin-[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?\.aarch64\.rpm/claude-desktop-bin-${VERSION}-${PKGREL}.aarch64.rpm/g" README.md
          sed -i -E "s/Claude_Desktop-[0-9]+\.[0-9]+\.[0-9]+-x86_64\.AppImage/Claude_Desktop-${VERSION}-x86_64.AppImage/g" README.md
          sed -i -E "s/Claude_Desktop-[0-9]+\.[0-9]+\.[0-9]+-aarch64\.AppImage/Claude_Desktop-${VERSION}-aarch64.AppImage/g" README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || {
            git commit -m "Update README install commands to v${VERSION}"
            git reset --hard HEAD
            git clean -fdx --exclude=aur-repo
            git pull --rebase origin master
            git push origin master
          }

      - name: Update Nix package hash
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          NIX_HASH: ${{ steps.nix-hash.outputs.released_nix_hash }}
        run: |
          sed -i -E "s|version = \"[^\"]+\"|version = \"$VERSION\"|" packaging/nix/package.nix
          sed -i -E "s|hash = \"sha256-[^\"]+\"|hash = \"$NIX_HASH\"|" packaging/nix/package.nix

          git add packaging/nix/package.nix
          git diff --staged --quiet || {
            git commit -m "Update Nix package hash for v${VERSION}"
            git reset --hard HEAD
            git clean -fdx --exclude=aur-repo
            git pull --rebase origin master
            git push origin master
          }

      - name: Cleanup
        if: always()
        run: |
          rm -rf release-files artifacts ~/.ssh/aur

  # ================================================================
  # RPM Repository — runs on Fedora for native rpm-sign support
  # ================================================================
  deploy-rpm-repo:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container: fedora:40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tooling
        run: dnf install -y rpm-sign createrepo_c gnupg2 git

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          path: rpm-files/
          merge-multiple: true

      - name: Download gh-pages content from release job
        uses: actions/download-artifact@v4
        with:
          name: gh-pages-content
          path: /tmp/

      - name: Sign RPMs and deploy repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY secret not set — skipping RPM repo deploy"
            exit 0
          fi

          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(echo "$GPG_PRIVATE_KEY" | gpg --show-keys --with-colons 2>/dev/null \
            | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$GPG_KEY_ID" > /tmp/gpg-key.asc

          # Restore gh-pages content from release job (APT repo + static files)
          # This avoids cloning gh-pages and eliminates the double-push race condition.
          REPO_DIR="/tmp/gh-pages-repo"
          rm -rf "$REPO_DIR"
          mkdir -p "$REPO_DIR"
          tar -xzf /tmp/gh-pages-content.tar.gz -C "$REPO_DIR"

          # Initialize a fresh git repo for the push (remove any .git from artifact)
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          rm -rf "$REPO_DIR/.git"
          cd "$REPO_DIR"
          git config --global --add safe.directory "$REPO_DIR"
          git init
          git checkout -b gh-pages
          git remote add origin "$REMOTE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd -

          # Copy GPG public key
          cp /tmp/gpg-key.asc "$REPO_DIR/gpg-key.asc"

          # Sign and add each RPM to the repository
          echo "RPM files found:"
          find rpm-files/ -name '*.rpm' -type f
          find rpm-files/ -name '*.rpm' -type f | while read -r RPM_FILE; do
            bash packaging/rpm/update-rpm-repo.sh "$RPM_FILE" "$REPO_DIR" "$GPG_KEY_ID"
          done

          # Single atomic push — this is the ONLY push to gh-pages in the entire pipeline
          cd "$REPO_DIR"
          git add -A
          git commit -m "Deploy repos: claude-desktop ${VERSION} (APT + RPM)"
          git push --force origin gh-pages

  # ================================================================
  # Job 5: Validate Nix package builds from GitHub Releases
  # ================================================================
  validate-nix:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (latest master with updated hash)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build with real fetchurl from GitHub Releases
        run: |
          echo "Validating Nix build using fetchurl from GitHub Releases..."
          echo "This simulates exactly what users run."
          NIXPKGS_ALLOW_UNFREE=1 nix build .#claude-desktop --no-link --print-build-logs --impure
          echo "Nix build validation passed — hash matches released tarball"
