name: Build & Release

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:  # Release trigger (dispatched automatically by version-check.yml on a new upstream version, or manually)
    inputs:
      force_rebuild:
        description: 'Force rebuild & release even if upstream version unchanged (bumps pkgrel for patch/feature updates)'
        required: false
        type: boolean
        default: false
      auto_pr:
        description: 'Auto-PR mode: build the official .deb, then open a PR bumping .upstream-version + Nix hash instead of publishing a release (manual conservative alternative; the auto-release path dispatched by version-check.yml does NOT set this).'
        required: false
        type: boolean
        default: false
      deb_version:
        description: 'Pin a specific upstream .deb version to ingest (e.g. 1.17377.0). Empty = highest available in the apt repo.'
        required: false
        type: string
        default: ''

# Serialize release runs: all workflow_dispatch runs share ONE group with
# cancel-in-progress off, so a second dispatch (e.g. version-check auto-release
# firing while a manual /deploy is in flight) QUEUES instead of racing the
# first run's release/AUR-push/master-commit section. PR validation keeps the
# per-branch group with cancellation (new push supersedes the old validation).
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('{0}-release-train', github.workflow) || format('{0}-{1}', github.workflow, github.head_ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

# ──────────────────────────────────────────────────────────────────────
# Job graph (fan-out / fan-in):
#
#   check-version ──► build-tarball         (amd64: ingest official .deb)
#         │           build-aarch64-tarball (arm64: ingest official arm64 .deb)
#         │                  │
#         │                  ├── package-appimage (matrix: x86_64, aarch64)
#         │                  ├── package-deb      (matrix: amd64, arm64)
#         │                  ├── package-rpm      (matrix: x86_64, aarch64)
#         │                  ├── test-nix
#         │                  └── generate-pkgbuild ──► test-pkgbuild (makepkg + namcap)
#         │                          │
#         │                  release (needs all above — workflow_dispatch, NOT auto_pr)
#         │                          │
#         │                  deploy-rpm-repo (fedora:40, signs RPMs — release path)
#         │                          │
#         │                  deploy-pages (deploys to GitHub Pages — release path)
#         │
#         └────────────────► open-version-pr (auto_pr mode only: bump .upstream-version + Nix hash, open PR)
#
# check-version polls Anthropic's official Linux .deb apt repo, GPG-verifies the
# signed Release, and downloads the amd64+arm64 .debs as artifacts. The build
# jobs ingest those .debs (Electron + node-pty come bundled inside — no pin, no
# cross-rebuild). kwin-portal-bridge is still built from source (Computer Use).
#
# On pull_request: all validation jobs run, release/deploy/PR jobs are skipped.
# On workflow_dispatch (default): full pipeline including release and deploy.
#   This is the AUTO-RELEASE path - version-check.yml dispatches it on a new
#   upstream version. Green run = released unattended (+ closes the tracking
#   issue via close-version-issue); red run = notify-version-issue-failure
#   comments on the tracking issue so a human runs the /update skill.
# On workflow_dispatch with auto_pr=true: build + validate, then open a PR; no
#   release is published (manual conservative alternative to auto-release).
# ──────────────────────────────────────────────────────────────────────

jobs:
  # ================================================================
  # Job 1: Check version & determine if update is needed
  # ================================================================
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      needs_update: ${{ steps.check.outputs.needs_update }}
      highest_version: ${{ steps.check.outputs.highest_version }}
      pkgrel: ${{ steps.pkgrel.outputs.pkgrel || steps.pr-defaults.outputs.pkgrel || '1' }}
      tag: ${{ steps.pkgrel.outputs.tag || steps.pr-defaults.outputs.tag }}
      release_name: ${{ steps.pkgrel.outputs.release_name || steps.pr-defaults.outputs.release_name }}
      make_latest: ${{ steps.pkgrel.outputs.make_latest || steps.pr-defaults.outputs.make_latest }}
      changelog: ${{ steps.git_changelog.outputs.content }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git changelog generation

      # ----------------------------------------------------------------
      # Query Anthropic's official Linux .deb apt repo, GPG-verify the signed
      # Release, and resolve + download the .deb(s). Electron, node-pty,
      # chrome-sandbox, etc. all ship inside the .deb, so there is nothing to
      # pin or cross-rebuild here.
      # ----------------------------------------------------------------
      - name: Resolve upstream version from apt (GPG-verified)
        id: version
        env:
          DEB_VERSION_INPUT: ${{ github.event.inputs.deb_version }}
        run: |
          if [ -n "${DEB_VERSION_INPUT}" ]; then
            # Caller pinned an explicit version (auto-PR dispatch from
            # version-check.yml). Trust it but confirm the apt repo has it.
            VERSION="${DEB_VERSION_INPUT}"
            echo "Using pinned upstream version: ${VERSION}"
          else
            VERSION=$(bash .github/scripts/apt-fetch-verify.sh poll)
            echo "Highest available upstream version (apt): ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download & GPG/SHA-verify official .deb (amd64 + arm64)
        id: deb
        env:
          WANT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p deb-artifacts
          # The shared helper GPG-verifies the signed Release, checks the
          # Packages index against it, downloads each arch's .deb, and verifies
          # its SHA256 against the signed Packages entry.
          for arch in amd64 arm64; do
            DEB=$(bash .github/scripts/apt-fetch-verify.sh download "$arch" deb-artifacts)
            META="deb-artifacts/claude-desktop_${arch}.meta"
            # shellcheck disable=SC1090
            source "$META"
            echo "Resolved ${arch}: v${VERSION} -> $(basename "$DEB")"
            # Guard: the arch we downloaded must match the version we intend to
            # build, so amd64 and arm64 never diverge in a single release.
            if [ -n "${WANT_VERSION}" ] && [ "${VERSION}" != "${WANT_VERSION}" ]; then
              echo "::error::${arch} apt highest (${VERSION}) != intended version (${WANT_VERSION})"
              exit 1
            fi
          done
          ls -la deb-artifacts/

      - name: Check if version changed
        id: check
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          RELEASES_JSON=$(curl -sf "https://api.github.com/repos/${REPO}/releases?per_page=20") || {
            echo "::error::Failed to fetch releases from GitHub API (rate limit or auth issue)"
            exit 1
          }

          HIGHEST_VERSION=$(echo "$RELEASES_JSON" | python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          versions = []
          for r in releases:
              tag = r['tag_name'].lstrip('v')
              base = tag.split('-')[0] if '-' in tag else tag
              parts = [int(x) for x in base.split('.')]
              versions.append((parts, base))
          if versions:
              versions.sort(key=lambda x: x[0], reverse=True)
              print(versions[0][1])
          else:
              print('')
          ")

          if [ -z "$HIGHEST_VERSION" ]; then
            echo "::error::No releases found — cannot determine highest version"
            exit 1
          fi

          echo "Highest released version: ${HIGHEST_VERSION}"
          echo "Current version: ${CURRENT_VERSION}"
          echo "highest_version=${HIGHEST_VERSION}" >> $GITHUB_OUTPUT

          if [ "$HIGHEST_VERSION" != "${CURRENT_VERSION}" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Version changed from ${HIGHEST_VERSION} to ${CURRENT_VERSION}"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

      - name: Determine package release number
        id: pkgrel
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          FORCE: ${{ github.event.inputs.force_rebuild }}
          NEEDS_UPDATE: ${{ steps.check.outputs.needs_update }}
          HIGHEST_VERSION: ${{ steps.check.outputs.highest_version }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$FORCE" == "true" ] && [ "$NEEDS_UPDATE" != "true" ]; then
            RELEASE_COUNT=$(curl -s "https://api.github.com/repos/${REPO}/releases?per_page=100" \
              | jq "[.[] | select(.tag_name | test(\"^v${VERSION}(-[0-9]+)?$\"))] | length")
            PKGREL=$((RELEASE_COUNT + 1))
          else
            PKGREL=1
          fi

          if [ "$PKGREL" -gt 1 ]; then
            TAG="v${VERSION}-${PKGREL}"
            RELEASE_NAME="Claude Desktop ${VERSION} (patch release ${PKGREL})"
          else
            TAG="v${VERSION}"
            RELEASE_NAME="Claude Desktop ${VERSION}"
          fi

          if [ "$VERSION" = "$HIGHEST_VERSION" ] || [ "$NEEDS_UPDATE" = "true" ]; then
            MAKE_LATEST="true"
          else
            MAKE_LATEST="false"
            echo "::warning::Building v${VERSION} but v${HIGHEST_VERSION} is higher — will NOT mark as Latest"
          fi

          echo "pkgrel=${PKGREL}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "make_latest=${MAKE_LATEST}" >> $GITHUB_OUTPUT
          echo "Package release: pkgrel=${PKGREL}, Tag: ${TAG}, Latest: ${MAKE_LATEST}"

      - name: Extract changelog for this release
        id: git_changelog
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          CHANGELOG=$(awk '
            /^## [0-9]{4}-[0-9]{2}-[0-9]{2}/ {
              if (found) exit;
              found = 1;
              next
            }
            found { print }
          ' CHANGELOG.md | sed '/^$/N;/^\n$/d')

          if [ -z "$CHANGELOG" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              CHANGELOG=$(git log "${LAST_TAG}..HEAD" --format="- %s" --no-merges --reverse)
            else
              CHANGELOG="No changes since last release."
            fi
          fi

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Decide if build should proceed
        id: decide
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] || \
             [ "${{ steps.check.outputs.needs_update }}" == "true" ] || \
             [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set defaults for PR builds
        id: pr-defaults
        if: github.event_name == 'pull_request'
        run: |
          echo "pkgrel=1" >> $GITHUB_OUTPUT
          echo "tag=v${{ steps.version.outputs.version }}-pr" >> $GITHUB_OUTPUT
          echo "release_name=PR Validation" >> $GITHUB_OUTPUT
          echo "make_latest=false" >> $GITHUB_OUTPUT

      - name: Upload amd64 .deb for build job
        if: steps.decide.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-deb-amd64
          path: |
            deb-artifacts/claude-desktop_*_amd64.deb
            deb-artifacts/claude-desktop_amd64.meta
          retention-days: 1

      - name: Upload arm64 .deb for build job
        if: steps.decide.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-deb-arm64
          path: |
            deb-artifacts/claude-desktop_*_arm64.deb
            deb-artifacts/claude-desktop_arm64.meta
          retention-days: 1

  # ================================================================
  # Job 1b: Lint shell scripts with shellcheck
  # ================================================================
  lint-scripts:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck on all scripts
        run: |
          echo "=== Running shellcheck on shell scripts ==="
          FAILED=false
          for f in scripts/*.sh packaging/apt/*.sh packaging/rpm/*.sh .github/scripts/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            if ! shellcheck -S error "$f"; then
              FAILED=true
            fi
          done
          if [ "$FAILED" = true ]; then
            echo "::error::shellcheck found errors in one or more scripts"
            exit 1
          fi
          echo "All scripts passed shellcheck"

      - name: Validate .desktop files
        run: |
          sudo apt-get install -y desktop-file-utils
          echo "=== Validating .desktop entries ==="
          FAILED=false
          # Extract .desktop from PKGBUILD.template
          sed -n '/^\[Desktop Entry\]/,/^EOF$/p' PKGBUILD.template | head -n -1 > /tmp/claude.desktop
          if desktop-file-validate /tmp/claude.desktop 2>&1 | grep -q "warning:"; then
            echo "::error::PKGBUILD.template .desktop has warnings:"
            desktop-file-validate /tmp/claude.desktop 2>&1 | grep "warning:"
            FAILED=true
          fi
          # Also validate standalone .desktop files
          for f in packaging/debian/*.desktop; do
            [ -f "$f" ] || continue
            if desktop-file-validate "$f" 2>&1 | grep -q "warning:"; then
              echo "::error::$f has warnings:"
              desktop-file-validate "$f" 2>&1 | grep "warning:"
              FAILED=true
            fi
          done
          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "All .desktop files passed validation"

      - name: Verify Nim patches compile
        run: |
          echo "=== Checking Nim patch syntax (compile check) ==="
          bash scripts/compile-nim-patches.sh

      - name: Guard against sibling-file no-op patches
        run: |
          # A patch can only reliably touch its single @patch-target (the
          # orchestrator stages each target in an isolated tmpfs copy). Deriving a
          # SECOND file's path from the staged target is a silent no-op — the
          # mechanism that shipped index.pre.js / mainView.js unpatched in v1.15200.
          bash scripts/check-patch-sibling-noop.sh

      - name: Verify Anthropic apt signing key fingerprint
        run: |
          # The committed key (packaging/claude-desktop-archive-keyring.asc) is
          # the trust anchor for the official .deb ingest. Assert it still carries
          # the expected fingerprint so a swapped/corrupted key fails the build
          # loudly rather than silently weakening verification.
          EXPECTED="31DDDE24DDFAB679F42D7BD2BAA929FF1A7ECACE"
          KEY="packaging/claude-desktop-archive-keyring.asc"
          test -f "$KEY" || { echo "::error::$KEY missing"; exit 1; }
          GNUPGHOME=$(mktemp -d); export GNUPGHOME; chmod 700 "$GNUPGHOME"
          gpg --batch --quiet --import "$KEY"
          if ! gpg --batch --with-colons --fingerprint 2>/dev/null \
                | grep -q "^fpr:::::::::${EXPECTED}:"; then
            echo "::error::$KEY fingerprint != expected ${EXPECTED}"
            exit 1
          fi
          echo "apt signing key fingerprint OK (${EXPECTED})"

  # ================================================================
  # Job 2: Build the patched tarball (the main bottleneck)
  # ================================================================
  build-tarball:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      tarball_sha256: ${{ steps.build.outputs.tarball_sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download amd64 .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-deb-amd64
          path: deb-input

      - name: Get kwin-portal-bridge repo HEAD
        id: bridge-rev
        run: |
          BRIDGE_SHA=$(git ls-remote https://github.com/patrickjaja/kwin-portal-bridge.git HEAD | cut -f1)
          echo "sha=${BRIDGE_SHA}" >> $GITHUB_OUTPUT
          echo "kwin-portal-bridge HEAD: ${BRIDGE_SHA}"

      - name: Cache kwin-portal-bridge binaries
        id: bridge-cache
        uses: actions/cache@v4
        with:
          path: /tmp/bridge-output
          key: kwin-portal-bridge-${{ steps.bridge-rev.outputs.sha }}

      - name: Build kwin-portal-bridge (x86_64 + aarch64)
        id: bridge
        if: steps.bridge-cache.outputs.cache-hit != 'true'
        run: |
          echo "=== Building kwin-portal-bridge (Ubuntu Noble base, native cargo cross) ==="
          mkdir -p /tmp/bridge-output

          docker run --rm \
            -v /tmp/bridge-output:/output \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:noble \
            bash -c '
              set -eo pipefail

              # multiarch apt: split host (amd64) and ports (arm64). Noble uses
              # deb822 sources; rewrite ubuntu.sources from scratch so
              # dpkg --add-architecture arm64 doesnt make apt fetch arm64
              # indexes from archive.ubuntu.com (which 404s for non-x86).
              dpkg --add-architecture arm64
              cat >/etc/apt/sources.list.d/ubuntu.sources <<SOURCES
          Types: deb
          URIs: http://archive.ubuntu.com/ubuntu
          Suites: noble noble-updates noble-backports
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu
          Suites: noble-security
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES

              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential pkg-config clang cmake curl ca-certificates git \
                gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                libxkbcommon-dev libpipewire-0.3-dev \
                libxkbcommon-dev:arm64 libpipewire-0.3-dev:arm64

              # Rust toolchain via rustup (Noble has no rust preinstalled)
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
                sh -s -- -y --profile minimal --default-toolchain stable \
                         --target x86_64-unknown-linux-gnu \
                         --target aarch64-unknown-linux-gnu
              export PATH=/root/.cargo/bin:$PATH

              cd /tmp
              git clone --depth=1 https://github.com/patrickjaja/kwin-portal-bridge.git
              cd kwin-portal-bridge

              # x86_64 build (native)
              cargo build --release --target x86_64-unknown-linux-gnu
              cp target/x86_64-unknown-linux-gnu/release/kwin-portal-bridge /output/kwin-portal-bridge
              echo "kwin-portal-bridge x86_64 built successfully"

              # aarch64 cross build (gcc-aarch64-linux-gnu as linker)
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
              export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
              export PKG_CONFIG_ALLOW_CROSS=1
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
              export PKG_CONFIG_SYSROOT_DIR=/
              export BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu="--target=aarch64-linux-gnu -I/usr/include/aarch64-linux-gnu -I/usr/include -I/usr/include/pipewire-0.3 -I/usr/include/spa-0.2"

              cargo build --release --target aarch64-unknown-linux-gnu
              cp target/aarch64-unknown-linux-gnu/release/kwin-portal-bridge /output/kwin-portal-bridge-aarch64
              echo "kwin-portal-bridge aarch64 built successfully"
            '

      - name: Verify kwin-portal-bridge binaries
        run: |
          echo "--- x86_64 binary ---"
          file /tmp/bridge-output/kwin-portal-bridge
          # objdump prints `(GLIBC_2.34)` — strip the parens with a digit-only
          # char class; `\S+` would swallow the trailing `)`.
          GLIBC_MAX=$(objdump -T /tmp/bridge-output/kwin-portal-bridge 2>/dev/null | grep -oP 'GLIBC_[0-9.]+' | sort -uV | tail -1 || echo "unknown")
          echo "kwin-portal-bridge x86_64 max glibc: ${GLIBC_MAX}"
          # Noble (glibc 2.39) is the floor: kwin-portal-bridge requires Plasma
          # 6.6+ and Noble is the oldest base any 6.6+ distro ships.
          # Version-compare via sort -V; `[[ a > b ]]` is lexicographic and
          # would mis-rank e.g. GLIBC_2.10 < GLIBC_2.4.
          HIGHEST=$(printf '%s\nGLIBC_2.39\n' "${GLIBC_MAX}" | sort -V | tail -1)
          if [[ "${HIGHEST}" != "GLIBC_2.39" ]]; then
            echo "::error::x86_64 binary requires ${GLIBC_MAX}, expected GLIBC_2.39 or lower"
            exit 1
          fi

          echo "--- aarch64 binary ---"
          file /tmp/bridge-output/kwin-portal-bridge-aarch64
          # Same glibc-2.39 floor as x86_64. The host runner needs an aarch64
          # objdump to read the symbols; install binutils-aarch64-linux-gnu so
          # the floor is actually enforced (not just logged) for the arm64 bridge.
          if ! command -v aarch64-linux-gnu-objdump >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq binutils-aarch64-linux-gnu || true
          fi
          if command -v aarch64-linux-gnu-objdump >/dev/null 2>&1; then
            GLIBC_MAX_ARM=$(aarch64-linux-gnu-objdump -T /tmp/bridge-output/kwin-portal-bridge-aarch64 2>/dev/null | grep -oP 'GLIBC_[0-9.]+' | sort -uV | tail -1 || echo "unknown")
            echo "kwin-portal-bridge aarch64 max glibc: ${GLIBC_MAX_ARM}"
            HIGHEST_ARM=$(printf '%s\nGLIBC_2.39\n' "${GLIBC_MAX_ARM}" | sort -V | tail -1)
            if [[ "${HIGHEST_ARM}" != "GLIBC_2.39" ]]; then
              echo "::error::aarch64 binary requires ${GLIBC_MAX_ARM}, expected GLIBC_2.39 or lower"
              exit 1
            fi
          else
            echo "::warning::aarch64-linux-gnu-objdump unavailable — could not enforce glibc floor on the arm64 bridge"
          fi

      - name: Build Patched Tarball (ingest official amd64 .deb)
        id: build
        run: |
          echo "=== Ingesting official .deb + applying patches in Arch container ==="

          DEB=$(ls deb-input/claude-desktop_*_amd64.deb)
          echo "Ingesting: ${DEB}"

          mkdir -p /tmp/build-input /tmp/build-output
          cp "$DEB" /tmp/build-input/claude.deb
          cp -r scripts patches js packaging /tmp/build-input/

          # Pass kwin-portal-bridge binary if available (Computer Use on Wayland)
          BRIDGE_ENV=""
          if [ -f /tmp/bridge-output/kwin-portal-bridge ]; then
            cp /tmp/bridge-output/kwin-portal-bridge /tmp/build-input/kwin-portal-bridge
            BRIDGE_ENV="KWIN_PORTAL_BRIDGE_BIN=/input/kwin-portal-bridge"
          fi

          # The .deb already bundles Electron + node-pty + chrome-sandbox etc.,
          # so the container needs only the .deb-cracking + patching toolchain
          # (binutils 'ar', tar/zstd/xz, asar, python, node, nim). No 'electron'
          # pacman package, no node-pty rebuild, no 7z.
          docker run --rm \
            -v /tmp/build-input:/input:ro \
            -v /tmp/build-output:/output \
            archlinux:base-devel \
            bash -c "
              set -eo pipefail

              echo '=== Installing build dependencies ==='
              pacman -Syu --noconfirm
              pacman -S --noconfirm python nodejs npm git imagemagick shellcheck nim nimble binutils tar zstd xz gnupg

              echo '=== Installing Nim regex package ==='
              nimble install -y regex

              echo '=== Installing asar from AUR ==='
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
              cd /tmp
              git clone https://aur.archlinux.org/yay-bin.git
              chown -R builder:builder yay-bin
              cd yay-bin
              su builder -c 'makepkg -si --noconfirm'
              su builder -c 'yay -S --noconfirm asar'

              echo '=== Running ingest+patch script (build-patched-tarball.sh) ==='
              # Local .deb already SHA-verified in check-version; GPG verify of a
              # signed Release does not apply to a local file, so disable it here.
              # Skip the smoke test here — it launches the bundled Electron out of
              # the raw tarball, which needs the host's Electron runtime libs
              # (nss/gtk3/alsa-lib) that base-devel doesn't ship. The real
              # smoke test runs in test-pkgbuild, which pacman -U's the built
              # package so its declared depends() are resolved exactly as a user
              # would get them.
              ${BRIDGE_ENV} CLAUDE_GPG_VERIFY=0 SKIP_SMOKE_TEST=1 \
                bash /input/scripts/build-patched-tarball.sh /input/claude.deb /output

              echo '=== Build completed ==='
            " 2>&1 | tee build-output.log

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "::error::Build FAILED!"
            echo ""
            echo "=== PATCH FAILURE DETAILS ==="
            grep -E "(ERROR|FAIL|\[FAIL\])" build-output.log || true
            echo ""
            echo "The upstream Claude Desktop .deb may have changed."
            echo "Please update the patch patterns to match the new file structure."
            exit 1
          fi

          # shellcheck disable=SC1091
          source /tmp/build-output/build-info.txt
          echo "tarball_sha256=${SHA256}" >> "$GITHUB_OUTPUT"

          echo "Build passed - tarball ready for upload"
          echo "  Version:  ${VERSION}"
          echo "  Arch:     ${ARCH:-amd64}"
          echo "  Electron: ${ELECTRON_VERSION:-unknown} (bundled, traceability only)"
          echo "  SHA256:   ${SHA256}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: /tmp/build-output/claude-desktop-*-linux.tar.gz
          retention-days: 1

      - name: Upload kwin-portal-bridge aarch64 binary
        uses: actions/upload-artifact@v4
        with:
          name: kwin-portal-bridge-aarch64
          path: /tmp/bridge-output/kwin-portal-bridge-aarch64
          retention-days: 1

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          retention-days: 30
          if-no-files-found: ignore

  # ================================================================
  # Job 2b: Build aarch64 tarball (ingest the official arm64 .deb directly)
  #
  # An official arm64 .deb now exists, so we ingest it the same way as amd64
  # instead of QEMU-rebuilding node-pty + swapping binaries. The .deb already
  # carries arm64 Electron + node-pty; we only bundle our arm64
  # kwin-portal-bridge (built from source in build-tarball). Patches are
  # arch-agnostic JS, so this runs in an amd64 Arch container — no QEMU.
  # ================================================================
  build-aarch64-tarball:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      tarball_aarch64_sha256: ${{ steps.build.outputs.tarball_aarch64_sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download arm64 .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-deb-arm64
          path: deb-input

      - name: Download kwin-portal-bridge aarch64
        uses: actions/download-artifact@v4
        with:
          name: kwin-portal-bridge-aarch64

      - name: Build aarch64 patched tarball (ingest official arm64 .deb)
        id: build
        run: |
          echo "=== Ingesting official arm64 .deb + applying patches ==="

          DEB=$(ls deb-input/claude-desktop_*_arm64.deb)
          echo "Ingesting: ${DEB}"

          mkdir -p /tmp/build-input-arm /tmp/build-output-arm
          cp "$DEB" /tmp/build-input-arm/claude.deb
          cp -r scripts patches js packaging /tmp/build-input-arm/

          # Bundle the prebuilt arm64 kwin-portal-bridge.
          BRIDGE_ENV=""
          if [ -f kwin-portal-bridge-aarch64 ]; then
            cp kwin-portal-bridge-aarch64 /tmp/build-input-arm/kwin-portal-bridge
            BRIDGE_ENV="KWIN_PORTAL_BRIDGE_BIN=/input/kwin-portal-bridge"
          fi

          docker run --rm \
            -v /tmp/build-input-arm:/input:ro \
            -v /tmp/build-output-arm:/output \
            archlinux:base-devel \
            bash -c "
              set -eo pipefail
              pacman -Syu --noconfirm
              pacman -S --noconfirm python nodejs npm git imagemagick shellcheck nim nimble binutils tar zstd xz gnupg
              nimble install -y regex
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
              cd /tmp
              git clone https://aur.archlinux.org/yay-bin.git
              chown -R builder:builder yay-bin
              cd yay-bin
              su builder -c 'makepkg -si --noconfirm'
              su builder -c 'yay -S --noconfirm asar'
              # arm64 .deb already SHA-verified in check-version; skip smoke test
              # (arm64 Electron can't run in this amd64 container) + GPG (local file).
              ${BRIDGE_ENV} CLAUDE_GPG_VERIFY=0 SKIP_SMOKE_TEST=1 \
                bash /input/scripts/build-patched-tarball.sh /input/claude.deb /output
            " 2>&1 | tee build-output-arm.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::aarch64 build FAILED"
            grep -E "(ERROR|FAIL|\[FAIL\])" build-output-arm.log || true
            exit 1
          fi

          # build-patched-tarball.sh names the arm64 output with the -aarch64 suffix.
          # shellcheck disable=SC1091
          source /tmp/build-output-arm/build-info.txt
          TARBALL=$(ls /tmp/build-output-arm/claude-desktop-*-linux-aarch64.tar.gz)
          cp "$TARBALL" .
          echo "tarball_aarch64_sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "Built aarch64 tarball: $(basename "$TARBALL") (arch=${ARCH:-arm64}, SHA256: ${SHA256})"

      - name: Upload aarch64 tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball-aarch64
          path: claude-desktop-*-linux-aarch64.tar.gz
          retention-days: 1

  # ================================================================
  # Job 3a: Build & test AppImage (matrix: x86_64, aarch64) — PARALLEL
  # ================================================================
  package-appimage:
    needs: [check-version, build-tarball, build-aarch64-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # amd64 -> `tarball`; aarch64 -> `tarball-aarch64` (already built from the
      # official arm64 .deb, with arm64 Electron + kwin-portal-bridge baked in).
      - name: Download x86_64 tarball
        if: matrix.arch == 'x86_64'
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Download aarch64 tarball
        if: matrix.arch == 'aarch64'
        uses: actions/download-artifact@v4
        with:
          name: tarball-aarch64

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget unzip file zsync

      - name: Build AppImage (${{ matrix.arch }})
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            TARBALL="claude-desktop-${VERSION}-linux-aarch64.tar.gz"
            ARCH_FLAG="--arch aarch64"
          else
            TARBALL="claude-desktop-${VERSION}-linux.tar.gz"
            ARCH_FLAG=""
          fi

          bash packaging/appimage/build-appimage.sh $ARCH_FLAG "$TARBALL" ./dist

      - name: Test AppImage
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            # AppImage outer ELF is aarch64 (can't execute under QEMU in Docker).
            # Verify on the host: check ELF arch, then extract with squashfs-tools
            # and validate the inner Electron binary is also aarch64.
            sudo apt-get install -y -qq squashfs-tools >/dev/null

            APPIMAGE="$(ls dist/Claude_Desktop-*-aarch64.AppImage)"

            # 1. Verify outer ELF is aarch64
            file "$APPIMAGE" | grep -q 'aarch64\|ARM aarch64'
            echo "AppImage outer ELF is aarch64 — OK"

            # 2. Extract squashfs payload (skip ELF runtime to find hsqs magic)
            OFFSET=$(python3 -c "import sys; data=open('$APPIMAGE','rb').read(); idx=data.find(b'hsqs'); assert idx>0,'squashfs magic not found'; print(idx)")
            unsquashfs -f -d /tmp/squashfs-root -o "$OFFSET" "$APPIMAGE"

            # 3. Verify inner contents
            test -f /tmp/squashfs-root/usr/lib/claude-desktop/resources/app.asar
            test -x /tmp/squashfs-root/usr/lib/claude-desktop/claude
            file /tmp/squashfs-root/usr/lib/claude-desktop/claude | grep -q 'aarch64\|ARM aarch64'
            echo "aarch64 AppImage smoke test passed"
            rm -rf /tmp/squashfs-root
          else
            docker run --rm \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y xvfb libgtk-3-0 libnss3 libasound2 libgbm1 libnotify4

                cp /dist/Claude_Desktop-*-x86_64.AppImage /tmp/
                chmod +x /tmp/Claude_Desktop-*-x86_64.AppImage
                cd /tmp
                /tmp/Claude_Desktop-*-x86_64.AppImage --appimage-extract

                SKIP_SANDBOX_CHECK=1 bash /scripts/smoke-test.sh \
                  /tmp/squashfs-root/usr/lib/claude-desktop/resources/app.asar \
                  /tmp/squashfs-root/usr/lib/claude-desktop/claude
              "
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: |
            dist/Claude_Desktop-*-${{ matrix.arch }}.AppImage
            dist/Claude_Desktop-*-${{ matrix.arch }}.AppImage.zsync
          retention-days: 1

  # ================================================================
  # Job 3b: Build & test Debian package (matrix: amd64, arm64) — PARALLEL
  # ================================================================
  package-deb:
    needs: [check-version, build-tarball, build-aarch64-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # amd64 -> `tarball`; arm64 -> `tarball-aarch64` (official arm64 .deb,
      # arm64 Electron + kwin-portal-bridge already bundled).
      - name: Download amd64 tarball
        if: matrix.arch == 'amd64'
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Download arm64 tarball
        if: matrix.arch == 'arm64'
        uses: actions/download-artifact@v4
        with:
          name: tarball-aarch64

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot

      # QEMU is still needed to *install + run* the arm64 .deb in the test step
      # below (not to build it — the tarball already carries arm64 binaries).
      - name: Set up QEMU for ARM64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Debian Package (${{ matrix.arch }})
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARBALL="claude-desktop-${VERSION}-linux-aarch64.tar.gz"
            ARCH_FLAG="--arch arm64"
          else
            TARBALL="claude-desktop-${VERSION}-linux.tar.gz"
            ARCH_FLAG=""
          fi

          bash packaging/debian/build-deb.sh $ARCH_FLAG "$TARBALL" ./dist "$PKGREL"

      - name: Test Debian Package (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            docker run --rm --platform linux/arm64 \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              arm64v8/ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y /dist/claude-desktop-bin_*_arm64.deb
                test -f /usr/lib/claude-desktop/claude
                test -f /usr/lib/claude-desktop/resources/app.asar
                test -x /usr/bin/claude-desktop
                echo 'ARM64 Debian package installed successfully'
              "
          else
            docker run --rm \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              ubuntu:22.04 \
              bash -c "
                set -e
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y xvfb /dist/claude-desktop-bin_*_amd64.deb
                bash /scripts/smoke-test.sh \
                  /usr/lib/claude-desktop/resources/app.asar \
                  /usr/lib/claude-desktop/claude
              "
          fi

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/claude-desktop-bin_*_${{ matrix.arch }}.deb
          retention-days: 1

  # ================================================================
  # Job 3c: Build & test RPM package (matrix: x86_64, aarch64) — PARALLEL
  # ================================================================
  package-rpm:
    needs: [check-version, build-tarball, build-aarch64-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # x86_64 -> `tarball`; aarch64 -> `tarball-aarch64` (official arm64 .deb,
      # arm64 Electron + kwin-portal-bridge already bundled).
      - name: Download x86_64 tarball
        if: matrix.arch == 'x86_64'
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Download aarch64 tarball
        if: matrix.arch == 'aarch64'
        uses: actions/download-artifact@v4
        with:
          name: tarball-aarch64

      # QEMU is still needed to *install + run* the aarch64 .rpm in the test
      # step below (not to build it — the tarball already carries arm64 binaries).
      - name: Set up QEMU for ARM64
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build RPM Package (${{ matrix.arch }})
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            TARBALL="claude-desktop-${VERSION}-linux-aarch64.tar.gz"
            ARCH_FLAG="--arch aarch64"
          else
            TARBALL="claude-desktop-${VERSION}-linux.tar.gz"
            ARCH_FLAG=""
          fi

          docker run --rm \
            -v "$(pwd):/build:ro" \
            -v "$(pwd)/dist:/output" \
            fedora:40 \
            bash -c "
              set -euo pipefail
              dnf install -y rpm-build wget unzip curl
              bash /build/packaging/rpm/build-rpm.sh $ARCH_FLAG /build/$TARBALL /output $PKGREL
            "

      - name: Test RPM Package (${{ matrix.arch }})
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            docker run --rm --platform linux/arm64 \
              -v "$(pwd)/dist:/dist:ro" \
              arm64v8/fedora:40 \
              bash -c "
                set -e
                dnf install -y /dist/claude-desktop-bin-*.aarch64.rpm
                test -f /usr/lib/claude-desktop/claude
                test -f /usr/lib/claude-desktop/resources/app.asar
                test -x /usr/bin/claude-desktop
                echo 'aarch64 RPM package installed successfully'
              "
          else
            docker run --rm \
              -v "$(pwd)/dist:/dist:ro" \
              -v "$(pwd)/scripts:/scripts:ro" \
              fedora:40 \
              bash -c "
                set -e
                dnf install -y xorg-x11-server-Xvfb /dist/claude-desktop-bin-*.x86_64.rpm
                bash /scripts/smoke-test.sh \
                  /usr/lib/claude-desktop/resources/app.asar \
                  /usr/lib/claude-desktop/claude
              "
          fi

      - name: Upload RPM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/claude-desktop-bin-*.${{ matrix.arch }}.rpm
          retention-days: 1

  # ================================================================
  # Job 3d: Test Nix build — PARALLEL
  # ================================================================
  test-nix:
    needs: [check-version, build-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      nix_hash: ${{ steps.nix-build.outputs.nix_hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build with Nix
        id: nix-build
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          TARBALL="$(pwd)/claude-desktop-${VERSION}-linux.tar.gz"

          HASH=$(nix hash file --type sha256 --sri "$TARBALL")
          echo "nix_hash=${HASH}" >> $GITHUB_OUTPUT

          sed -i -E "s|version = \"[^\"]+\"|version = \"$VERSION\"|" packaging/nix/package.nix
          sed -i -E "s|hash = \"sha256-[^\"]+\"|hash = \"$HASH\"|" packaging/nix/package.nix

          awk -v tarball="$TARBALL" '
            /src = fetchurl \{/ { print "  src = " tarball ";"; skip=1; next }
            skip && /\};/ { skip=0; next }
            !skip' packaging/nix/package.nix > /tmp/package-ci.nix
          mv /tmp/package-ci.nix packaging/nix/package.nix

          NIXPKGS_ALLOW_UNFREE=1 nix build .#claude-desktop --no-link --print-build-logs --impure

  # ================================================================
  # Job 3e: Generate PKGBUILD & .SRCINFO — PARALLEL
  # ================================================================
  generate-pkgbuild:
    needs: [check-version, build-tarball, build-aarch64-tarball]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate PKGBUILD
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
          TARBALL_SHA256: ${{ needs.build-tarball.outputs.tarball_sha256 }}
          SHA256SUM_AARCH64: ${{ needs.build-aarch64-tarball.outputs.tarball_aarch64_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          PREBUILT_URL="https://github.com/${REPO}/releases/download/${TAG}/claude-desktop-${VERSION}-linux.tar.gz"
          export DOWNLOAD_URL_AARCH64="https://github.com/${REPO}/releases/download/${TAG}/claude-desktop-${VERSION}-linux-aarch64.tar.gz"
          bash ./scripts/generate-pkgbuild.sh "${VERSION}" "${TARBALL_SHA256}" "$PREBUILT_URL" "${PKGREL}" > PKGBUILD
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cat << 'EOF' > generate-srcinfo.sh
          #!/bin/bash
          source PKGBUILD

          echo "pkgbase = ${pkgname}"
          echo -e "\tpkgdesc = ${pkgdesc}"
          echo -e "\tpkgver = ${pkgver}"
          echo -e "\tpkgrel = ${pkgrel}"
          echo -e "\turl = ${url}"

          for a in "${arch[@]}"; do
            echo -e "\tarch = ${a}"
          done

          echo -e "\tlicense = ${license[0]}"

          for dep in "${makedepends[@]}"; do
            echo -e "\tmakedepends = ${dep}"
          done

          for dep in "${depends[@]}"; do
            echo -e "\tdepends = ${dep}"
          done

          for src in "${source_x86_64[@]}"; do
            echo -e "\tsource_x86_64 = ${src}"
          done

          for sum in "${sha256sums_x86_64[@]}"; do
            echo -e "\tsha256sums_x86_64 = ${sum}"
          done

          for src in "${source_aarch64[@]}"; do
            echo -e "\tsource_aarch64 = ${src}"
          done

          for sum in "${sha256sums_aarch64[@]}"; do
            echo -e "\tsha256sums_aarch64 = ${sum}"
          done

          echo ""
          echo "pkgname = ${pkgname}"
          EOF

          bash generate-srcinfo.sh > .SRCINFO
          rm generate-srcinfo.sh
          cat .SRCINFO

      - name: Upload PKGBUILD artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkgbuild
          # The .install file is referenced by PKGBUILD's `install=` field and
          # MUST travel with it — makepkg reads it relative to the PKGBUILD dir,
          # and the AUR repo needs it for users' makepkg too.
          path: |
            PKGBUILD
            .SRCINFO
            claude-desktop-bin.install
          include-hidden-files: true
          retention-days: 1

  # ================================================================
  # Job 3f: Test PKGBUILD with makepkg + namcap — catches packaging bugs
  # ================================================================
  test-pkgbuild:
    needs: [check-version, build-tarball, generate-pkgbuild]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Download PKGBUILD
        uses: actions/download-artifact@v4
        with:
          name: pkgbuild

      - name: Test makepkg (cross-device build dir)
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          # The PKGBUILD now has a SINGLE tarball source (Electron is bundled
          # inside the tarball's electron/ tree, extracted from the official .deb
          # — no separate Electron zip source to fetch/verify). Point that one
          # source at the local tarball so makepkg builds offline (the release
          # isn't published yet).
          TARBALL="claude-desktop-${VERSION}-linux.tar.gz"

          # Override tarball source with the local file.
          sed -i "s|^source_x86_64=.*|source_x86_64=(\"${TARBALL}\")|" PKGBUILD
          sed -i "s|^sha256sums_x86_64=.*|sha256sums_x86_64=('SKIP')|" PKGBUILD

          # Neutralize aarch64 sources — test runs on x86_64 only; prevents namcap
          # from trying to fetch the not-yet-published aarch64 URLs
          sed -i "s|^source_aarch64=.*|source_aarch64=()|" PKGBUILD
          sed -i "s|^sha256sums_aarch64=.*|sha256sums_aarch64=()|" PKGBUILD

          # Copy everything into a staging dir for the Docker bind-mount.
          # claude-desktop-bin.install must sit next to PKGBUILD (makepkg reads
          # the install= file relative to the PKGBUILD dir).
          mkdir -p /tmp/pkgbuild-test
          cp PKGBUILD .SRCINFO claude-desktop-bin.install "$TARBALL" /tmp/pkgbuild-test/

          docker run --rm \
            --tmpfs /tmp/cross-device:exec,size=2g \
            -v /tmp/pkgbuild-test:/input:ro \
            archlinux:base-devel \
            bash -c '
              set -euo pipefail

              # Install build deps (electron is bundled, not a system dependency)
              pacman -Syu --noconfirm
              pacman -S --noconfirm unzip namcap

              # Set up a non-root builder (makepkg refuses to run as root)
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              # Use tmpfs as the build directory — tests on a different filesystem
              BUILD_DIR=/tmp/cross-device/pkgbuild
              mkdir -p "$BUILD_DIR"
              cp /input/* "$BUILD_DIR/"
              chown -R builder:builder "$BUILD_DIR"

              # Run makepkg (skip PGP checks, use local source)
              cd "$BUILD_DIR"
              su builder -c "makepkg -sf --noconfirm --skipchecksums 2>&1"

              # Run namcap on the built package to catch dependency issues
              PKG=$(ls "$BUILD_DIR"/*.pkg.tar.zst 2>/dev/null | head -1)
              if [ -z "$PKG" ]; then
                echo "::error::makepkg produced no package file"
                exit 1
              fi
              echo ""
              echo "=== namcap package lint ==="
              # namcap returns 0 even with warnings; grep for errors
              NAMCAP_OUT=$(namcap "$PKG" 2>&1 || true)
              echo "$NAMCAP_OUT"

              # Fail only on namcap errors (E:), not warnings (W:)
              # W: lines about implicitly satisfied deps, unstripped ELF, etc. are expected
              # for packages that bundle Electron binaries
              if echo "$NAMCAP_OUT" | grep -qE "^claude-desktop-bin E:.*dependency"; then
                echo "::error::namcap detected dependency errors in the built package"
                exit 1
              fi
              echo "namcap passed (no dependency errors)"

              # ── Install + launch smoke test ──────────────────────────────
              # This is the real pre-release gate: does the package actually
              # install and start on a clean Arch system? pacman -U resolves the
              # PKGBUILD depends() (alsa-lib gtk3 nss ...) exactly as a user
              # would get them — so a missing/wrong dependency FAILS here rather
              # than shipping to AUR. Then we launch the installed binary under
              # xvfb and confirm it survives startup (a missing Electron runtime
              # lib would abort with exit 127).
              echo ""
              echo "=== Installing built package (resolves depends() via pacman) ==="
              pacman -U --noconfirm "$PKG"

              echo ""
              echo "=== Launch smoke test (installed /usr/bin/claude-desktop under xvfb) ==="
              pacman -S --noconfirm xorg-server-xvfb

              # The launcher falls back to a direct exec when user-systemd is
              # absent (containers) and forwards extra args to Electron. We pass
              # --no-sandbox explicitly: Docker blocks the user-namespace syscalls
              # Chromium\x27s sandbox needs, so without it the app aborts in CI.
              # (A real install keeps the sandbox — chrome-sandbox is shipped
              # SUID-root and the launcher does not add this flag on a normal X11
              # desktop.)
              set +e
              STDERR_LOG=$(mktemp)
              xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
                claude-desktop --no-sandbox 2>"$STDERR_LOG" &
              APP_PID=$!
              ELAPSED=0
              CRASHED=0
              while [ $ELAPSED -lt 15 ]; do
                if ! kill -0 "$APP_PID" 2>/dev/null; then
                  wait "$APP_PID"; EC=$?
                  echo "::error::Installed app exited early after ${ELAPSED}s (exit $EC)"
                  CRASHED=1
                  break
                fi
                sleep 1; ELAPSED=$((ELAPSED + 1))
              done
              echo "--- launcher/electron stderr ---"
              cat "$STDERR_LOG"
              echo "--------------------------------"
              kill "$APP_PID" 2>/dev/null; wait "$APP_PID" 2>/dev/null
              if [ "$CRASHED" = 1 ]; then
                exit 1
              fi
              echo "Install + launch smoke test passed — package installs and starts cleanly"
            '

  # ================================================================
  # Job 4: Release & Publish (fan-in — waits for ALL parallel jobs)
  # ================================================================
  release:
    needs: [check-version, build-tarball, build-aarch64-tarball, lint-scripts, package-appimage, package-deb, package-rpm, test-nix, generate-pkgbuild, test-pkgbuild]
    # Publish only on a real release dispatch — NOT in auto_pr mode (auto_pr
    # builds + validates everything, then opens a PR via open-version-pr; the
    # human merge + a follow-up plain workflow_dispatch run does the release).
    # deploy-rpm-repo / deploy-pages / validate-nix all `needs: release`, so they
    # skip transitively when this is skipped.
    if: needs.check-version.outputs.should_build == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.auto_pr != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release files
        id: files
        run: |
          mkdir -p release-files

          # Tarballs
          cp artifacts/tarball/claude-desktop-*-linux.tar.gz release-files/
          cp artifacts/tarball-aarch64/claude-desktop-*-linux-aarch64.tar.gz release-files/

          # AppImages
          cp artifacts/appimage-x86_64/Claude_Desktop-*-x86_64.AppImage release-files/
          cp artifacts/appimage-aarch64/Claude_Desktop-*-aarch64.AppImage release-files/

          # Zsync files (for AppImage delta updates -- required for --appimage-update)
          cp artifacts/appimage-x86_64/Claude_Desktop-*-x86_64.AppImage.zsync release-files/
          cp artifacts/appimage-aarch64/Claude_Desktop-*-aarch64.AppImage.zsync release-files/

          # DEBs
          cp artifacts/deb-amd64/claude-desktop-bin_*_amd64.deb release-files/
          cp artifacts/deb-arm64/claude-desktop-bin_*_arm64.deb release-files/

          # RPMs
          cp artifacts/rpm-x86_64/claude-desktop-bin-*.x86_64.rpm release-files/
          cp artifacts/rpm-aarch64/claude-desktop-bin-*.aarch64.rpm release-files/

          # PKGBUILD (+ the .install file it references via install=)
          cp artifacts/pkgbuild/PKGBUILD .
          cp artifacts/pkgbuild/.SRCINFO .
          cp artifacts/pkgbuild/claude-desktop-bin.install .

          # Compute all SHA256 checksums
          # Use ls + grep to avoid glob matching both tarballs
          TARBALL_X86=$(ls release-files/claude-desktop-*-linux.tar.gz | grep -v aarch64)
          echo "tarball_sha256=$(sha256sum "$TARBALL_X86" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "tarball_aarch64_sha256=$(sha256sum release-files/claude-desktop-*-linux-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "appimage_x86_64_sha256=$(sha256sum release-files/Claude_Desktop-*-x86_64.AppImage | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "appimage_aarch64_sha256=$(sha256sum release-files/Claude_Desktop-*-aarch64.AppImage | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "deb_amd64_sha256=$(sha256sum release-files/claude-desktop-bin_*_amd64.deb | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "deb_arm64_sha256=$(sha256sum release-files/claude-desktop-bin_*_arm64.deb | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "rpm_x86_64_sha256=$(sha256sum release-files/claude-desktop-bin-*.x86_64.rpm | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "rpm_aarch64_sha256=$(sha256sum release-files/claude-desktop-bin-*.aarch64.rpm | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          ls -la release-files/

      - name: Create GitHub Release
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
          RELEASE_NAME: ${{ needs.check-version.outputs.release_name }}
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
          CHANGELOG: ${{ needs.check-version.outputs.changelog }}
          MAKE_LATEST: ${{ needs.check-version.outputs.make_latest }}
          TARBALL_SHA: ${{ steps.files.outputs.tarball_sha256 }}
          APPIMAGE_X86_SHA: ${{ steps.files.outputs.appimage_x86_64_sha256 }}
          APPIMAGE_ARM_SHA: ${{ steps.files.outputs.appimage_aarch64_sha256 }}
          DEB_AMD_SHA: ${{ steps.files.outputs.deb_amd64_sha256 }}
          DEB_ARM_SHA: ${{ steps.files.outputs.deb_arm64_sha256 }}
          RPM_X86_SHA: ${{ steps.files.outputs.rpm_x86_64_sha256 }}
          RPM_ARM_SHA: ${{ steps.files.outputs.rpm_aarch64_sha256 }}
          REPO: ${{ github.repository }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.release_name }}
          files: release-files/*
          body: |
            ## ${{ needs.check-version.outputs.release_name }}

            This release provides Claude Desktop version ${{ needs.check-version.outputs.version }} pre-patched for Linux.

            ### Installation Options

            **Arch Linux (AUR)**
            ```bash
            yay -S claude-desktop-bin
            ```

            **Debian/Ubuntu (APT Repository — recommended)**
            ```bash
            curl -fsSL https://patrickjaja.github.io/claude-desktop-bin/install.sh | sudo bash
            sudo apt install claude-desktop-bin
            ```

            **Debian/Ubuntu (manual .deb)**
            ```bash
            # x86_64
            sudo apt install ./claude-desktop-bin_${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}_amd64.deb
            # ARM64
            sudo apt install ./claude-desktop-bin_${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}_arm64.deb
            ```

            **Fedora/RHEL (RPM Repository — recommended)**
            ```bash
            curl -fsSL https://patrickjaja.github.io/claude-desktop-bin/install-rpm.sh | sudo bash
            sudo dnf install claude-desktop-bin
            ```

            **Fedora/RHEL (manual .rpm)**
            ```bash
            # x86_64
            sudo dnf install ./claude-desktop-bin-${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}.x86_64.rpm
            # ARM64
            sudo dnf install ./claude-desktop-bin-${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.pkgrel }}.aarch64.rpm
            ```

            **NixOS / Nix**
            ```bash
            nix run github:patrickjaja/claude-desktop-bin
            ```

            **AppImage (Any Distro)**
            ```bash
            # x86_64
            chmod +x Claude_Desktop-${{ needs.check-version.outputs.version }}-x86_64.AppImage
            ./Claude_Desktop-${{ needs.check-version.outputs.version }}-x86_64.AppImage
            # ARM64
            chmod +x Claude_Desktop-${{ needs.check-version.outputs.version }}-aarch64.AppImage
            ./Claude_Desktop-${{ needs.check-version.outputs.version }}-aarch64.AppImage
            ```

            > **Update existing AppImage** (delta download — only changed blocks):
            > ```bash
            > appimageupdatetool Claude_Desktop-*-x86_64.AppImage
            > # Or from within the AppImage:
            > ./Claude_Desktop-*-x86_64.AppImage --appimage-update
            > ```

            ### Checksums
            | File | SHA256 |
            |------|--------|
            | Tarball (x86_64) | `${{ steps.files.outputs.tarball_sha256 }}` |
            | Tarball (aarch64) | `${{ steps.files.outputs.tarball_aarch64_sha256 }}` |
            | AppImage (x86_64) | `${{ steps.files.outputs.appimage_x86_64_sha256 }}` |
            | AppImage (aarch64) | `${{ steps.files.outputs.appimage_aarch64_sha256 }}` |
            | Debian (amd64) | `${{ steps.files.outputs.deb_amd64_sha256 }}` |
            | Debian (arm64) | `${{ steps.files.outputs.deb_arm64_sha256 }}` |
            | RPM (x86_64) | `${{ steps.files.outputs.rpm_x86_64_sha256 }}` |
            | RPM (aarch64) | `${{ steps.files.outputs.rpm_aarch64_sha256 }}` |

            ### Changes since last release
            ${{ needs.check-version.outputs.changelog }}

            ### Links
            - [AUR Package](https://aur.archlinux.org/packages/claude-desktop-bin)
            - [Full Changelog](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)
          draft: false
          prerelease: false
          make_latest: ${{ needs.check-version.outputs.make_latest }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy APT Repository and static files
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
          REPO: ${{ github.repository }}
        run: |
          DEB_FILE_AMD64="$(pwd)/release-files/claude-desktop-bin_${VERSION}-${PKGREL}_amd64.deb"
          DEB_FILE_ARM64="$(pwd)/release-files/claude-desktop-bin_${VERSION}-${PKGREL}_arm64.deb"
          RPM_FILE_X86_64="$(pwd)/release-files/claude-desktop-bin-${VERSION}-${PKGREL}.x86_64.rpm"
          RPM_FILE_AARCH64="$(pwd)/release-files/claude-desktop-bin-${VERSION}-${PKGREL}.aarch64.rpm"

          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY secret not set — skipping repo deploy"
            exit 0
          fi

          sudo apt-get install -y dpkg-dev apt-utils

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(echo "$GPG_PRIVATE_KEY" | gpg --show-keys --with-colons 2>/dev/null \
            | grep '^sec:' | head -1 | cut -d: -f5)

          REPO_DIR="/tmp/gh-pages-repo"
          rm -rf "$REPO_DIR"
          mkdir -p "$REPO_DIR"

          cp packaging/apt/install.sh "$REPO_DIR/"
          cp site/index.html "$REPO_DIR/"
          cp packaging/rpm/install-rpm.sh "$REPO_DIR/"
          gpg --armor --export "$GPG_KEY_ID" > "$REPO_DIR/gpg-key.asc"
          touch "$REPO_DIR/.nojekyll"

          # Shields.io endpoint badges
          mkdir -p "$REPO_DIR/badges"
          cat > "$REPO_DIR/badges/version-check.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Claude Desktop",
            "message": "v${VERSION}-${PKGREL} (latest)",
            "color": "brightgreen"
          }
          BADGE_EOF

          # Detect which architectures were actually built
          DEB_ARCHS=""
          [ -f "$DEB_FILE_AMD64" ] && DEB_ARCHS="amd64"
          [ -f "$DEB_FILE_ARM64" ] && DEB_ARCHS="${DEB_ARCHS:+$DEB_ARCHS, }arm64"
          RPM_ARCHS=""
          [ -f "$RPM_FILE_X86_64" ] && RPM_ARCHS="x86_64"
          [ -f "$RPM_FILE_AARCH64" ] && RPM_ARCHS="${RPM_ARCHS:+$RPM_ARCHS, }aarch64"

          cat > "$REPO_DIR/badges/apt-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "APT repo",
            "message": "v${VERSION}-${PKGREL} (${DEB_ARCHS:-none})",
            "color": "blue"
          }
          BADGE_EOF

          cat > "$REPO_DIR/badges/rpm-repo.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "RPM repo",
            "message": "v${VERSION}-${PKGREL} (${RPM_ARCHS:-none})",
            "color": "blue"
          }
          BADGE_EOF

          # AppImage badge — detect from release-files
          APPIMAGE_ARCHS=""
          ls release-files/Claude_Desktop-*-x86_64.AppImage >/dev/null 2>&1 && APPIMAGE_ARCHS="x86_64"
          ls release-files/Claude_Desktop-*-aarch64.AppImage >/dev/null 2>&1 && APPIMAGE_ARCHS="${APPIMAGE_ARCHS:+$APPIMAGE_ARCHS, }aarch64"
          cat > "$REPO_DIR/badges/appimage.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "AppImage",
            "message": "v${VERSION}-${PKGREL} (${APPIMAGE_ARCHS:-none})",
            "color": "blue"
          }
          BADGE_EOF

          # Nix flake badge — always built if we got here
          cat > "$REPO_DIR/badges/nix.json" <<BADGE_EOF
          {
            "schemaVersion": 1,
            "label": "Nix flake",
            "message": "v${VERSION}-${PKGREL}",
            "color": "blue"
          }
          BADGE_EOF

          for DEB_FILE in "$DEB_FILE_AMD64" "$DEB_FILE_ARM64"; do
            if [ -f "$DEB_FILE" ]; then
              bash packaging/apt/update-apt-repo.sh "$DEB_FILE" "$REPO_DIR" "$GPG_KEY_ID"
            else
              echo "::warning::$(basename "$DEB_FILE") not found — skipping"
            fi
          done

          # Package the gh-pages content as an artifact for the RPM job to finalize.
          # Do NOT push here — the deploy-rpm-repo job will add RPMs and do the
          # single push, avoiding two Pages deployments and CDN race conditions.
          tar -czf /tmp/gh-pages-content.tar.gz -C "$REPO_DIR" .

      - name: Upload gh-pages content
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages-content
          path: /tmp/gh-pages-content.tar.gz
          retention-days: 1

      - name: Verify release tarball download
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
          VERSION: ${{ needs.check-version.outputs.version }}
          EXPECTED_SHA: ${{ needs.build-tarball.outputs.tarball_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/releases/download/${TAG}/claude-desktop-${VERSION}-linux.tar.gz"

          echo "Verifying release tarball at: ${URL}"
          for i in 1 2 3 4 5; do
            if wget -q -O /tmp/verify-tarball.tar.gz "${URL}" 2>/dev/null; then
              break
            fi
            echo "Attempt $i failed, waiting 10s..."
            sleep 10
          done

          if [ ! -f /tmp/verify-tarball.tar.gz ]; then
            echo "::error::Failed to download release tarball after 5 attempts"
            exit 1
          fi

          ACTUAL_SHA=$(sha256sum /tmp/verify-tarball.tar.gz | cut -d' ' -f1)
          rm -f /tmp/verify-tarball.tar.gz

          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::SHA256 MISMATCH! Expected: ${EXPECTED_SHA}, Got: ${ACTUAL_SHA}"
            echo "Aborting AUR push to prevent broken package."
            exit 1
          fi

          echo "Verified: SHA256 matches (${ACTUAL_SHA})"

      - name: Refresh base-tag tarballs on patch releases
        if: needs.check-version.outputs.pkgrel != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # package.nix fetches the tarball from the BASE tag (v${VERSION}, no
          # pkgrel suffix). On a pkgrel bump the new assets land only on the
          # v${VERSION}-N tag, so without this step Nix users would silently
          # keep getting the previous build. Clobber the base-tag tarballs with
          # the freshly built ones; the nix-hash step below then computes the
          # matching new hash for package.nix.
          gh release upload "v${VERSION}" \
            "release-files/claude-desktop-${VERSION}-linux.tar.gz" \
            "release-files/claude-desktop-${VERSION}-linux-aarch64.tar.gz" \
            --repo "$REPO" --clobber
          echo "Refreshed base-tag (v${VERSION}) tarballs for Nix"

      - name: Compute Nix hash from released tarball
        id: nix-hash
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # package.nix always uses v${version} (base version, no pkgrel suffix).
          # Compute the hash from that exact URL so it matches what users fetch
          # (on pkgrel bumps the step above refreshed those base-tag assets).
          NIX_URL="https://github.com/${REPO}/releases/download/v${VERSION}/claude-desktop-${VERSION}-linux.tar.gz"

          echo "Fetching tarball from Nix fetchurl URL: ${NIX_URL}"
          for i in 1 2 3 4 5; do
            if wget -q -O /tmp/nix-tarball.tar.gz "${NIX_URL}" 2>/dev/null; then
              break
            fi
            echo "Attempt $i failed, waiting 10s..."
            sleep 10
          done

          if [ ! -f /tmp/nix-tarball.tar.gz ]; then
            echo "::error::Failed to download tarball from Nix URL after 5 attempts"
            exit 1
          fi

          RELEASED_NIX_HASH=$(python3 -c "
          import hashlib, base64
          h = hashlib.sha256(open('/tmp/nix-tarball.tar.gz','rb').read()).digest()
          print('sha256-' + base64.b64encode(h).decode())
          ")
          echo "released_nix_hash=${RELEASED_NIX_HASH}" >> $GITHUB_OUTPUT

          rm -f /tmp/nix-tarball.tar.gz
          echo "Nix SRI hash (from v${VERSION} release): ${RELEASED_NIX_HASH}"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          printf '%s\n' \
            "Host aur.archlinux.org" \
            "  User aur" \
            "  IdentityFile ~/.ssh/aur" \
            "  StrictHostKeyChecking no" \
            >> ~/.ssh/config

      - name: Push to AUR
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          git config --global user.name "$AUR_USERNAME"
          git config --global user.email "$AUR_EMAIL"

          git clone ssh://aur@aur.archlinux.org/claude-desktop-bin.git aur-repo

          # PKGBUILD's install= points at claude-desktop-bin.install; ship it so
          # users' makepkg finds it (it's checked out at repo root + also in the
          # pkgbuild artifact, which the Organize step copied to root).
          cp PKGBUILD .SRCINFO claude-desktop-bin.install aur-repo/

          cd aur-repo
          git add PKGBUILD .SRCINFO claude-desktop-bin.install
          git diff --staged --quiet || {
            git commit -m "Update to ${VERSION}-${PKGREL}"
            git push origin master
            echo "Successfully pushed to AUR"
          }

      - name: Update README with new version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          PKGREL: ${{ needs.check-version.outputs.pkgrel }}
        run: |
          sed -i -E "s/claude-desktop-bin_[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?_amd64\.deb/claude-desktop-bin_${VERSION}-${PKGREL}_amd64.deb/g" README.md
          sed -i -E "s/claude-desktop-bin_[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?_arm64\.deb/claude-desktop-bin_${VERSION}-${PKGREL}_arm64.deb/g" README.md
          sed -i -E "s/claude-desktop-bin-[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?\.x86_64\.rpm/claude-desktop-bin-${VERSION}-${PKGREL}.x86_64.rpm/g" README.md
          sed -i -E "s/claude-desktop-bin-[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?\.aarch64\.rpm/claude-desktop-bin-${VERSION}-${PKGREL}.aarch64.rpm/g" README.md
          sed -i -E "s/Claude_Desktop-[0-9]+\.[0-9]+\.[0-9]+-x86_64\.AppImage/Claude_Desktop-${VERSION}-x86_64.AppImage/g" README.md
          sed -i -E "s/Claude_Desktop-[0-9]+\.[0-9]+\.[0-9]+-aarch64\.AppImage/Claude_Desktop-${VERSION}-aarch64.AppImage/g" README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || {
            git commit -m "Update README install commands to v${VERSION}"
            git reset --hard HEAD
            git clean -fdx --exclude=aur-repo
            git pull --rebase origin master
            git push origin master
          }

      - name: Update Nix package hash + .upstream-version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          NIX_HASH: ${{ steps.nix-hash.outputs.released_nix_hash }}
        run: |
          sed -i -E "s|version = \"[^\"]+\"|version = \"$VERSION\"|" packaging/nix/package.nix
          sed -i -E "s|hash = \"sha256-[^\"]+\"|hash = \"$NIX_HASH\"|" packaging/nix/package.nix

          # Record the released version as the one our patches/docs are validated
          # against. Without this, version-check.yml keeps re-detecting a "new"
          # version (it compares the apt index against .upstream-version) after a
          # release that skipped the auto-PR path (e.g. an upstream .N rebuild).
          echo "${VERSION}" > .upstream-version

          git add packaging/nix/package.nix .upstream-version
          git diff --staged --quiet || {
            git commit -m "Update Nix package hash + .upstream-version for v${VERSION}"
            git reset --hard HEAD
            git clean -fdx --exclude=aur-repo
            git pull --rebase origin master
            git push origin master
          }

      - name: Cleanup
        if: always()
        run: |
          rm -rf release-files artifacts ~/.ssh/aur

  # ================================================================
  # RPM Repository — runs on Fedora for native rpm-sign support
  # ================================================================
  deploy-rpm-repo:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_build == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: fedora:40
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tooling
        run: dnf install -y rpm-sign createrepo_c gnupg2

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          path: rpm-files/
          merge-multiple: true

      - name: Download gh-pages content from release job
        uses: actions/download-artifact@v4
        with:
          name: gh-pages-content
          path: /tmp/

      - name: Sign RPMs and build repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY secret not set — skipping RPM repo deploy"
            exit 0
          fi

          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(echo "$GPG_PRIVATE_KEY" | gpg --show-keys --with-colons 2>/dev/null \
            | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$GPG_KEY_ID" > /tmp/gpg-key.asc

          # Restore gh-pages content from release job (APT repo + static files)
          REPO_DIR="/tmp/gh-pages-repo"
          rm -rf "$REPO_DIR"
          mkdir -p "$REPO_DIR"
          tar -xzf /tmp/gh-pages-content.tar.gz -C "$REPO_DIR"
          rm -rf "$REPO_DIR/.git"

          # Copy GPG public key
          cp /tmp/gpg-key.asc "$REPO_DIR/gpg-key.asc"

          # Sign and add each RPM to the repository
          echo "RPM files found:"
          find rpm-files/ -name '*.rpm' -type f
          find rpm-files/ -name '*.rpm' -type f | while read -r RPM_FILE; do
            bash packaging/rpm/update-rpm-repo.sh "$RPM_FILE" "$REPO_DIR" "$GPG_KEY_ID"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/gh-pages-repo

  # ================================================================
  # Job 6: Deploy to GitHub Pages (artifact-based, no 100MB git limit)
  # ================================================================
  deploy-pages:
    needs: [deploy-rpm-repo]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ================================================================
  # Job 7: Validate Nix package builds from GitHub Releases
  # ================================================================
  validate-nix:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_build == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (latest master with updated hash)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build with real fetchurl from GitHub Releases
        run: |
          echo "Validating Nix build using fetchurl from GitHub Releases..."
          echo "This simulates exactly what users run."
          NIXPKGS_ALLOW_UNFREE=1 nix build .#claude-desktop --no-link --print-build-logs --impure

  # ================================================================
  # Job 8: Auto-PR — open a PR bumping .upstream-version + Nix hash
  #
  # Runs ONLY in auto_pr mode (dispatched by version-check.yml on a newly
  # detected upstream version). The full build + all package/validate jobs have
  # already proven the new .deb patches cleanly and packages everywhere; this
  # job records that by bumping the tracked version + Nix hash and opening a PR.
  # A human reviews/merges, then triggers a normal release run. We never publish
  # a release directly from the auto path.
  # ================================================================
  open-version-pr:
    needs: [check-version, build-tarball, build-aarch64-tarball, lint-scripts, package-appimage, package-deb, package-rpm, test-nix, generate-pkgbuild, test-pkgbuild]
    if: needs.check-version.outputs.should_build == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.auto_pr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump .upstream-version + Nix hash and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          NIX_HASH: ${{ needs.test-nix.outputs.nix_hash }}
          TARBALL_SHA: ${{ needs.build-tarball.outputs.tarball_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH="auto/upstream-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If a PR branch for this version already exists, don't duplicate it.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::notice::Branch ${BRANCH} already exists — skipping (PR already open)"
            exit 0
          fi

          git checkout -b "$BRANCH"

          # 1. Bump the tracked upstream version (silences version-check.yml).
          echo "${VERSION}" > .upstream-version

          # 2. Pre-update the Nix version + hash to the locally-built tarball hash.
          #    (The release job recomputes from the published asset; this keeps the
          #    PR self-consistent so reviewers see the intended values.)
          if [ -n "${NIX_HASH}" ]; then
            sed -i -E "s|version = \"[^\"]+\"|version = \"${VERSION}\"|" packaging/nix/package.nix
            sed -i -E "s|hash = \"sha256-[^\"]+\"|hash = \"${NIX_HASH}\"|" packaging/nix/package.nix
          fi

          git add .upstream-version packaging/nix/package.nix
          if git diff --staged --quiet; then
            echo "::notice::Nothing to bump — .upstream-version already at ${VERSION}"
            exit 0
          fi

          COMMIT_MSG=$(mktemp)
          {
            echo "Upstream bump to v${VERSION} (auto-PR)"
            echo ""
            echo "Built + validated from the official Linux .deb:"
            echo "- .deb ingested, all patches applied (build-tarball + build-aarch64-tarball green)"
            echo "- .deb/.rpm/.AppImage/Nix/AUR packaging jobs green"
            echo "- tarball SHA256: ${TARBALL_SHA}"
            echo ""
            echo "Review the patch validation, then merge + run Build & Release"
            echo "(workflow_dispatch, auto_pr unset) to publish."
          } > "$COMMIT_MSG"
          git commit -F "$COMMIT_MSG"
          rm -f "$COMMIT_MSG"

          git push origin "$BRANCH"

          gh pr create \
            --repo "${REPO}" \
            --base master \
            --head "$BRANCH" \
            --title "Upstream bump to v${VERSION}" \
            --body "Automated by version-check.yml after a clean build from the official Linux .deb (v${VERSION}). All build + packaging + validation jobs passed. Merge, then run **Build & Release** (workflow_dispatch, leave \`auto_pr\` unchecked) to publish the release." \
            || echo "::warning::gh pr create failed (branch pushed; open the PR manually)"

          echo "::notice::Opened auto-PR for v${VERSION} on branch ${BRANCH}"

  # ================================================================
  # Version-issue bookkeeping for the AUTO-RELEASE flow.
  # version-check.yml opens a "new-version" tracking issue, then
  # dispatches this workflow in release mode. Green run -> close the
  # issue (fully unattended update). Red run -> comment on the issue:
  # that comment is the human's signal to run the /update skill (fix
  # broken patch anchors, or remove/convert patches upstream fixed).
  # Both jobs only touch an open new-version issue matching the built
  # version, so manual dispatches behave sensibly too.
  # ================================================================
  close-version-issue:
    needs: [check-version, release, deploy-pages]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.auto_pr != 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close matching new-version issue
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NUMBERS=$(gh issue list --repo "$REPO" --label "new-version" --state open \
            --search "New Claude Desktop v${VERSION}" --json number --jq '.[].number')
          if [ -z "$NUMBERS" ]; then
            echo "No open new-version issue for v${VERSION} - nothing to close."
            exit 0
          fi
          for N in $NUMBERS; do
            gh issue close "$N" --repo "$REPO" --comment \
              "v${VERSION} was released automatically: all patches applied cleanly against the new upstream .deb, validation + smoke test passed, packages published, and \`.upstream-version\` was bumped by the release job. No manual action was needed. ([run](${RUN_URL}))"
            echo "Closed issue #${N}"
          done

  notify-version-issue-failure:
    needs: [check-version, build-tarball, build-aarch64-tarball, lint-scripts, package-appimage, package-deb, package-rpm, test-nix, generate-pkgbuild, test-pkgbuild, release, deploy-rpm-repo, deploy-pages]
    if: failure() && github.event_name == 'workflow_dispatch' && github.event.inputs.auto_pr != 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment on matching new-version issue
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version || github.event.inputs.deb_version }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "No version resolved - skipping issue comment."
            exit 0
          fi
          NUMBERS=$(gh issue list --repo "$REPO" --label "new-version" --state open \
            --search "New Claude Desktop v${VERSION}" --json number --jq '.[].number')
          if [ -z "$NUMBERS" ]; then
            echo "No open new-version issue for v${VERSION} - nothing to comment on."
            exit 0
          fi
          {
            echo "**Automatic release of v${VERSION} FAILED** - manual attention needed. ([failed run](${RUN_URL}))"
            echo ""
            echo "Most likely cause: the upstream re-minify moved a patch anchor (fix the regex), or upstream natively implemented something we patch (then remove the patch or convert it to a regression guard - see CLAUDE.md, Patch Strictness Rules). Run the \`/update ${VERSION}\` skill in a Claude Code session in this repo, or follow the prompt in the issue body above."
            echo ""
            echo "The 2-hourly version check will NOT retry while this issue stays open; a successful release run closes it automatically."
          } > /tmp/failure-comment.md
          for N in $NUMBERS; do
            gh issue comment "$N" --repo "$REPO" --body-file /tmp/failure-comment.md
            echo "Commented on issue #${N}"
          done
